<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせありがとうございます | MITAS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy:      #1B3A6B;
      --navy-deep: #0D2340;
      --teal:      #0EA5E9;
      --teal-light:#38BDF8;
      --gray-500:  #64748B;
      --gray-100:  #F1F5F9;
      --white:     #ffffff;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--navy-deep);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--white);
      margin-bottom: 56px;
      text-decoration: none;
    }
    .logo svg { width: 22px; height: 22px; }
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(14,165,233,0.15);
      border: 1.5px solid rgba(56,189,248,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .icon-wrap svg {
      width: 32px;
      height: 32px;
      stroke: var(--teal-light);
    }
    h1 {
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.62);
      line-height: 2;
      max-width: 480px;
      margin: 0 auto 40px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--teal);
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(14,165,233,0.35);
    }
    .btn:hover {
      background: var(--teal-light);
      box-shadow: 0 6px 24px rgba(14,165,233,0.45);
    }
    .note {
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>
  <a href="/" class="logo">
    <svg viewBox="0 0 24 24" fill="none">
      <path d="M12 3C12 3 5 11.5 5 16C5 19.866 8.134 23 12 23C15.866 23 19 19.866 19 16C19 11.5 12 3 12 3Z"
            stroke="rgba(56,189,248,0.75)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
            fill="rgba(14,165,233,0.1)"/>
    </svg>
    MITAS
  </a>

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h1>お問い合わせを<br>受け付けました</h1>
  <p>
    ご相談内容を確認の上、営業日2日以内にご連絡いたします。<br>
    しばらくお待ちください。<br><br>
    売り込みはありません。<br>
    状況をお聞きした上で、最適な対応をご案内します。
  </p>

  <a href="/" class="btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    トップページへ戻る
  </a>

  <p class="note">このページはお問い合わせ完了後に表示されます。</p>
</body>
</html>
