<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>施設登録 - Mitas</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1B3A6B;
            --teal: #0EA5E9;
            --gray: #64748B;
            --gray-light: #F1F5F9;
            --white: #FFFFFF;
            --dark: #0F172A;
            --border: #E2E8F0;
            --error: #EF4444;
            --success: #10B981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--dark);
            background: var(--gray-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: var(--navy);
            text-decoration: none;
        }

        .logo span { color: var(--teal); }

        main {
            flex: 1;
            max-width: 640px;
            margin: 48px auto;
            padding: 0 24px;
            width: 100%;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: var(--gray);
            margin-bottom: 36px;
        }

        .form-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 36px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
        }

        label .required {
            color: var(--error);
            margin-left: 4px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            color: var(--dark);
            background: var(--white);
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(14,165,233,0.1);
        }

        textarea { height: 120px; resize: vertical; }

        .hint {
            font-size: 12px;
            color: var(--gray);
            margin-top: 6px;
        }

        .btn-submit {
            width: 100%;
            background: var(--navy);
            color: var(--white);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover { background: #2A5298; }

        .privacy-note {
            font-size: 12px;
            color: var(--gray);
            text-align: center;
            margin-top: 16px;
            line-height: 1.6;
        }

        .privacy-note a { color: var(--teal); text-decoration: none; }

        .success-box {
            background: #ECFDF5;
            border: 1px solid #6EE7B7;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            display: none;
        }

        .success-box h2 {
            font-size: 18px;
            color: var(--success);
            margin-bottom: 8px;
        }

        .success-box p {
            font-size: 14px;
            color: var(--gray);
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">mi<span>tas</span></a>
    </header>

    <main>
        <h1>施設登録</h1>
        <p class="subtitle">登録後24時間以内に、専任コンシェルジュからご連絡いたします。</p>

        <div class="form-card">
            <div id="success-box" class="success-box">
                <h2>ご登録ありがとうございます</h2>
                <p>専任コンシェルジュが確認次第、24時間以内にご連絡いたします。</p>
            </div>

            <form id="register-form">
                <div class="form-group">
                    <label>施設名<span class="required">*</span></label>
                    <input type="text" name="facility_name" placeholder="例：〇〇クリニック" required>
                </div>

                <div class="form-group">
                    <label>施設種別<span class="required">*</span></label>
                    <select name="facility_type" required>
                        <option value="">選択してください</option>
                        <option value="clinic">クリニック・診療所</option>
                        <option value="hospital">病院</option>
                        <option value="homecare">在宅医療専門</option>
                        <option value="nursing">介護施設</option>
                        <option value="other">その他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>所在地（都道府県）<span class="required">*</span></label>
                    <select name="prefecture" required>
                        <option value="">選択してください</option>
                        <option value="tokyo">東京都</option>
                        <option value="kanagawa">神奈川県</option>
                        <option value="saitama">埼玉県</option>
                        <option value="chiba">千葉県</option>
                        <option value="other">その他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>ご担当者名<span class="required">*</span></label>
                    <input type="text" name="contact_name" placeholder="例：山田 太郎" required>
                </div>

                <div class="form-group">
                    <label>メールアドレス<span class="required">*</span></label>
                    <input type="email" name="email" placeholder="例：info@clinic.jp" required>
                </div>

                <div class="form-group">
                    <label>電話番号<span class="required">*</span></label>
                    <input type="tel" name="phone" placeholder="例：03-1234-5678" required>
                </div>

                <div class="form-group">
                    <label>お探しの職種<span class="required">*</span></label>
                    <select name="job_type" required>
                        <option value="">選択してください</option>
                        <option value="doctor">医師</option>
                        <option value="nurse">看護師</option>
                        <option value="both">医師・看護師両方</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>採用の緊急度</label>
                    <select name="urgency">
                        <option value="">選択してください</option>
                        <option value="asap">なるべく早く（1ヶ月以内）</option>
                        <option value="3months">3ヶ月以内</option>
                        <option value="6months">半年以内</option>
                        <option value="flexible">時期は柔軟</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>採用要件・ご要望（任意）</label>
                    <textarea name="requirements" placeholder="例：週2〜3回の訪問診療ができる内科医を探しています。在宅医療経験があれば尚可。"></textarea>
                    <p class="hint">経験・資格・勤務形態など、ご自由にお書きください。</p>
                </div>

                <button type="submit" class="btn-submit">登録して相談を始める</button>

                <p class="privacy-note">
                    登録することで<a href="/terms.html">利用規約</a>および<a href="/privacy-policy.html">プライバシーポリシー</a>に同意したものとみなされます。
                </p>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('.btn-submit');
            btn.textContent = '送信中...';
            btn.disabled = true;

            // TODO: 実際の送信処理（Netlify Forms or API連携）
            await new Promise(r => setTimeout(r, 1000));

            this.style.display = 'none';
            document.getElementById('success-box').style.display = 'block';
        });
    </script>
</body>
</html>
