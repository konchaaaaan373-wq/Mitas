[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content-Security-Policy
    # Supabase / Google Fonts / GA / CDN（jsdelivr）への接続を許可
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com https://*.netlify.app https://*.googleapis.com https://scdn.line-apps.com https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.supabase.co; upgrade-insecure-requests;"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ──────────────────────────────────────────
# v1 / 旧 API（互換）
# ──────────────────────────────────────────

# 病院ログイン API
[[redirects]]
  from = "/api/hospital/login"
  to = "/.netlify/functions/hospital-login"
  status = 200

# 病院案件一覧 API
[[redirects]]
  from = "/api/hospital/cases"
  to = "/.netlify/functions/hospital-cases"
  status = 200

# 病院候補者一覧 API
[[redirects]]
  from = "/api/hospital/candidates"
  to = "/.netlify/functions/hospital-candidates"
  status = 200

# ──────────────────────────────────────────
# v2 API – Phase 1 ワークフロー（4ロール対応）
# 認証: Supabase Auth Bearer JWT
# RLS: DB側で4ロール毎の閲覧範囲を強制
# ──────────────────────────────────────────

# Staffing Requests v2
[[redirects]]
  from = "/api/v2/requests/*"
  to = "/.netlify/functions/requests-v2/:splat"
  status = 200
[[redirects]]
  from = "/api/v2/requests"
  to = "/.netlify/functions/requests-v2"
  status = 200

# Proposals v2
[[redirects]]
  from = "/api/v2/proposals/*"
  to = "/.netlify/functions/proposals-v2/:splat"
  status = 200
[[redirects]]
  from = "/api/v2/proposals"
  to = "/.netlify/functions/proposals-v2"
  status = 200

# Assignments v2
[[redirects]]
  from = "/api/v2/assignments/*"
  to = "/.netlify/functions/assignments-v2/:splat"
  status = 200
[[redirects]]
  from = "/api/v2/assignments"
  to = "/.netlify/functions/assignments-v2"
  status = 200

# Invoices v2
[[redirects]]
  from = "/api/v2/invoices/*"
  to = "/.netlify/functions/invoices-v2/:splat"
  status = 200
[[redirects]]
  from = "/api/v2/invoices"
  to = "/.netlify/functions/invoices-v2"
  status = 200

# Alliance Dashboard KPI
[[redirects]]
  from = "/api/v2/dashboard/kpi"
  to = "/.netlify/functions/dashboard-kpi-v2"
  status = 200

# /worker は worker-app.html へエイリアス
[[redirects]]
  from = "/worker"
  to = "/worker-app.html"
  status = 200

# /neco は neco-console.html へエイリアス
[[redirects]]
  from = "/neco"
  to = "/neco-console.html"
  status = 200
