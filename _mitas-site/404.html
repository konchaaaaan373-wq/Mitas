<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページが見つかりません - Mitas</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1B3A6B;
            --navy-light: #2A5298;
            --teal: #0EA5E9;
            --gray: #64748B;
            --gray-light: #F1F5F9;
            --white: #FFFFFF;
            --dark: #0F172A;
            --border: #E2E8F0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--dark);
            background: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--navy);
            text-decoration: none;
        }

        .logo span { color: var(--teal); }

        nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        nav a {
            color: var(--gray);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover { color: var(--navy); }

        .btn-nav {
            background: var(--navy);
            color: var(--white) !important;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 600 !important;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 64px 24px;
            text-align: center;
        }

        .error-content {
            max-width: 480px;
        }

        .error-code {
            font-size: 100px;
            font-weight: 700;
            color: var(--navy);
            line-height: 1;
            margin-bottom: 24px;
            opacity: 0.12;
            letter-spacing: -4px;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: var(--gray);
            line-height: 1.7;
            margin-bottom: 40px;
        }

        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--navy);
            color: var(--white);
            padding: 13px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.2s;
            display: inline-block;
        }

        .btn-primary:hover { background: var(--navy-light); }

        .btn-outline {
            background: transparent;
            color: var(--navy);
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            border: 2px solid var(--border);
            transition: border-color 0.2s;
            display: inline-block;
        }

        .btn-outline:hover { border-color: var(--navy); }

        footer {
            background: var(--dark);
            color: rgba(255,255,255,0.6);
            padding: 32px 24px;
            text-align: center;
        }

        .footer-copy {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
        }

        @media (max-width: 640px) {
            nav a:not(.btn-nav) { display: none; }
            .error-code { font-size: 72px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="/" class="logo">mi<span>tas</span></a>
            <nav>
                <a href="/#how-it-works">使い方</a>
                <a href="/#features">特徴</a>
                <a href="/faq.html">よくある質問</a>
                <a href="/register.html" class="btn-nav">無料で始める</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="error-content">
            <div class="error-code">404</div>
            <span class="error-icon">🔍</span>
            <h1>ページが見つかりません</h1>
            <p>お探しのページは移動・削除されたか、URLが間違っている可能性があります。<br>トップページからご確認ください。</p>
            <div class="actions">
                <a href="/" class="btn-primary">トップページへ戻る</a>
                <a href="/faq.html" class="btn-outline">よくある質問</a>
            </div>
        </div>
    </main>

    <footer>
        <p class="footer-copy">© 2026 Mitas. All rights reserved.</p>
    </footer>

</body>
</html>
