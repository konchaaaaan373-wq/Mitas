<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理ダッシュボード | MITAS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy:        #1B3A6B;
      --navy-deep:   #0D2340;
      --navy-mid:    #243B5E;
      --navy-light:  #2E4F82;
      --teal:        #0EA5E9;
      --teal-dark:   #0284C7;
      --green:       #10B981;
      --amber:       #F59E0B;
      --red:         #EF4444;
      --red-dark:    #DC2626;
      --gray-900:    #0F172A;
      --gray-700:    #334155;
      --gray-600:    #475569;
      --gray-500:    #64748B;
      --gray-400:    #94A3B8;
      --gray-300:    #CBD5E1;
      --gray-200:    #E2E8F0;
      --gray-100:    #F1F5F9;
      --gray-50:     #F8FAFC;
      --white:       #FFFFFF;
      --bg:          #EEF2F7;
      --sidebar-w:   224px;
      --topbar-h:    56px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--gray-700);
      background: var(--bg);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── ローディング ─────────────────────────── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
    }
    #loadingOverlay .spin {
      width: 28px; height: 28px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loadingOverlay p { font-size: 13px; color: var(--gray-500); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── サイドバー ──────────────────────────── */
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--navy-deep);
      display: flex;
      flex-direction: column;
      z-index: 100;
      overflow: hidden;
    }

    .sidebar__brand {
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .sidebar__logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.12em;
    }
    .sidebar__logo-sep {
      width: 1px; height: 16px;
      background: rgba(255,255,255,0.18);
    }
    .sidebar__logo-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.04em;
      line-height: 1.3;
    }

    .sidebar__nav {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .sidebar__nav::-webkit-scrollbar { width: 4px; }
    .sidebar__nav::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }

    .nav-group {
      margin-bottom: 2px;
    }
    .nav-group__label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 14px 20px 5px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px 9px 18px;
      border-left: 3px solid transparent;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      user-select: none;
    }
    .nav-item:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.9);
    }
    .nav-item.active {
      background: rgba(14,165,233,0.14);
      color: var(--white);
      border-left-color: var(--teal);
    }
    .nav-item__icon {
      width: 17px;
      text-align: center;
      font-size: 14px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .nav-item.active .nav-item__icon { opacity: 1; }
    .nav-item__label { flex: 1; }
    .nav-item__badge {
      background: var(--teal);
      color: var(--white);
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      line-height: 18px;
      text-align: center;
      border-radius: 9px;
      padding: 0 5px;
    }

    .sidebar__footer {
      padding: 14px 18px;
      border-top: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .sidebar__org {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 1px;
    }
    .sidebar__org-id {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      font-family: 'Courier New', monospace;
    }

    /* ─── トップバー ──────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: var(--sidebar-w);
      right: 0;
      height: var(--topbar-h);
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
      z-index: 90;
    }

    .topbar__title-area { flex: 1; min-width: 0; }
    .topbar__page-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--navy);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topbar__page-sub {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 1px;
    }

    .topbar__actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* 新規依頼ボタン */
    .btn-new-request {
      height: 34px;
      padding: 0 16px;
      background: var(--navy);
      color: var(--white);
      border: none;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.12s;
      white-space: nowrap;
    }
    .btn-new-request:hover { background: var(--navy-deep); }

    /* 通知ベル */
    .topbar__bell {
      position: relative;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--gray-200);
      border-radius: 3px;
      cursor: pointer;
      color: var(--gray-500);
      font-size: 15px;
      transition: background 0.12s;
    }
    .topbar__bell:hover { background: var(--gray-50); }
    .topbar__bell .dot {
      position: absolute;
      top: 7px; right: 7px;
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      border: 1.5px solid var(--white);
    }

    /* ユーザーメニュー */
    .topbar__user {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      border: 1px solid var(--gray-200);
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .topbar__user:hover { background: var(--gray-50); }
    .topbar__avatar {
      width: 26px; height: 26px;
      background: var(--navy);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }
    .topbar__user-info { line-height: 1.2; }
    .topbar__user-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-700);
    }
    .topbar__user-role {
      font-size: 10px;
      color: var(--gray-400);
    }
    .topbar__caret {
      font-size: 9px;
      color: var(--gray-400);
      margin-left: 2px;
    }

    .user-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--white);
      border: 1px solid var(--gray-200);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      min-width: 160px;
      z-index: 200;
    }
    .user-dropdown.open { display: block; }
    .user-dropdown a {
      display: block;
      padding: 9px 16px;
      font-size: 12px;
      color: var(--gray-700);
      text-decoration: none;
      transition: background 0.1s;
    }
    .user-dropdown a:hover { background: var(--gray-50); }
    .user-dropdown a.danger { color: var(--red-dark); }
    .user-dropdown hr {
      border: none;
      border-top: 1px solid var(--gray-100);
    }

    /* ─── メインエリア ─────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      padding-top: var(--topbar-h);
      min-height: 100vh;
    }

    /* ─── ページセクション共通 ──────────────────── */
    .page-section {
      padding: 24px;
      display: none;
    }
    .page-section.active { display: block; }

    /* ─── レスポンシブ ──────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 0px; }
      .sidebar { transform: translateX(-220px); transition: transform 0.2s; }
      .sidebar.open { transform: translateX(0); --sidebar-w: 224px; }
      .topbar { left: 0; padding-left: 16px; }
    }
  </style>
</head>
<body>

  <!-- ローディング -->
  <div id="loadingOverlay">
    <div class="spin"></div>
    <p>認証を確認中...</p>
  </div>

  <!-- サイドバー -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <span class="sidebar__logo">MITAS</span>
      <div class="sidebar__logo-sep"></div>
      <span class="sidebar__logo-sub">管理者<br>ポータル</span>
    </div>

    <nav class="sidebar__nav" id="sidebarNav">
      <div class="nav-group">
        <p class="nav-group__label">メニュー</p>

        <a class="nav-item active" data-section="overview" href="#">
          <span class="nav-item__icon">&#9632;</span>
          <span class="nav-item__label">ダッシュボード</span>
        </a>

        <a class="nav-item" data-section="cases" href="#">
          <span class="nav-item__icon">&#9654;</span>
          <span class="nav-item__label">案件管理</span>
          <span class="nav-item__badge" id="badge-cases">8</span>
        </a>

        <a class="nav-item" data-section="candidates" href="#">
          <span class="nav-item__icon">&#9670;</span>
          <span class="nav-item__label">候補者確認</span>
          <span class="nav-item__badge" id="badge-candidates">3</span>
        </a>

        <a class="nav-item" data-section="tasks" href="#">
          <span class="nav-item__icon">&#9744;</span>
          <span class="nav-item__label">タスク</span>
        </a>
      </div>

      <div class="nav-group">
        <p class="nav-group__label">管理</p>

        <a class="nav-item" data-section="inquiries" href="#">
          <span class="nav-item__icon">&#9993;</span>
          <span class="nav-item__label">問い合わせ</span>
        </a>

        <a class="nav-item" data-section="settings" href="#">
          <span class="nav-item__icon">&#9881;</span>
          <span class="nav-item__label">設定</span>
        </a>
      </div>
    </nav>

    <div class="sidebar__footer">
      <p class="sidebar__org"    id="sidebarOrgName">-</p>
      <p class="sidebar__org-id" id="sidebarOrgId">-</p>
    </div>
  </aside>

  <!-- トップバー -->
  <header class="topbar">
    <div class="topbar__title-area">
      <p class="topbar__page-title" id="pageTitle">ダッシュボード</p>
      <p class="topbar__page-sub"   id="pageDate">-</p>
    </div>
    <div class="topbar__actions">
      <button class="btn-new-request" id="btnNewRequest">+ 新規依頼</button>
      <div class="topbar__bell" title="通知">
        &#9993;
        <span class="dot"></span>
      </div>
      <div class="topbar__user" id="userMenu">
        <div class="topbar__avatar" id="userAvatar">-</div>
        <div class="topbar__user-info">
          <p class="topbar__user-name" id="userName">-</p>
          <p class="topbar__user-role">管理者</p>
        </div>
        <span class="topbar__caret">&#9660;</span>
        <div class="user-dropdown" id="userDropdown">
          <a href="#" data-section="settings">アカウント設定</a>
          <a href="mailto:neco.oncall@gmail.com">担当者に問い合わせ</a>
          <hr>
          <a href="#" id="logoutBtn" class="danger">ログアウト</a>
        </div>
      </div>
    </div>
  </header>

  <!-- メインコンテンツ（各セクションをここに追加していく） -->
  <main class="main" id="mainContent" style="display:none;">

    <!-- STEP2以降で各セクションを追加 -->

  </main>

  <script>
    /* ─── 認証確認（セッション検証） ─────────────── */
    (function checkAuth() {
      const token = sessionStorage.getItem('mitas_token');
      if (!token) { location.href = '/login.html'; return; }
      try {
        const parts = token.split('.');
        if (parts.length !== 3) throw new Error();
        const pad = s => s + '='.repeat((4 - s.length % 4) % 4);
        const payload = JSON.parse(atob(pad(parts[1].replace(/-/g,'+').replace(/_/g,'/'))));
        if (payload.exp && payload.exp < Math.floor(Date.now() / 1000)) {
          sessionStorage.clear(); location.href = '/login.html'; return;
        }
        initApp(payload);
      } catch {
        sessionStorage.clear(); location.href = '/login.html';
      }
    })();

    /* ─── アプリ初期化 ─────────────────────────── */
    function initApp(payload) {
      const org   = JSON.parse(sessionStorage.getItem('mitas_org') || '{}');
      const name  = org.name || payload.name || '組織名未設定';
      const orgId = org.id   || payload.sub  || '-';

      // サイドバー・ヘッダーに組織情報をセット
      document.getElementById('sidebarOrgName').textContent = name;
      document.getElementById('sidebarOrgId').textContent   = orgId;
      document.getElementById('userName').textContent = name.length > 10 ? name.slice(0, 10) + '…' : name;
      const initials = name.replace(/[\s　]/g, '').slice(0, 2);
      document.getElementById('userAvatar').textContent = initials;

      // 日付
      const fmt = new Intl.DateTimeFormat('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
      document.getElementById('pageDate').textContent = fmt.format(new Date());

      // ローディング解除
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('mainContent').style.display   = 'block';

      // 初期セクション表示
      showSection('overview');
    }

    /* ─── セクション切り替え ─────────────────────── */
    const SECTION_TITLES = {
      overview:   'ダッシュボード',
      cases:      '案件管理',
      candidates: '候補者確認',
      tasks:      'タスク',
      inquiries:  '問い合わせ',
      settings:   '設定',
    };

    function showSection(id) {
      // セクション表示
      document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
      const target = document.getElementById('s-' + id);
      if (target) target.classList.add('active');

      // ナビのアクティブ状態
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const navItem = document.querySelector(`.nav-item[data-section="${id}"]`);
      if (navItem) navItem.classList.add('active');

      // タイトル更新
      document.getElementById('pageTitle').textContent = SECTION_TITLES[id] || id;
    }

    /* ─── ナビゲーションイベント ─────────────────── */
    document.getElementById('sidebarNav').addEventListener('click', e => {
      const item = e.target.closest('.nav-item');
      if (!item) return;
      e.preventDefault();
      showSection(item.dataset.section);
    });

    /* ─── ユーザーメニュー ───────────────────────── */
    const userMenu     = document.getElementById('userMenu');
    const userDropdown = document.getElementById('userDropdown');
    userMenu.addEventListener('click', e => {
      e.stopPropagation();
      userDropdown.classList.toggle('open');
    });
    document.addEventListener('click', () => userDropdown.classList.remove('open'));

    /* ─── ログアウト ─────────────────────────────── */
    document.getElementById('logoutBtn').addEventListener('click', e => {
      e.preventDefault();
      sessionStorage.clear();
      location.href = '/login.html';
    });

    /* ─── 新規依頼ボタン（STEP3で実装） ────────────── */
    document.getElementById('btnNewRequest').addEventListener('click', () => {
      // STEP3でモーダルを開く処理を追加
    });
  </script>
</body>
</html>
