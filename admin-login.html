<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neco 管理者ログイン</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #F8F9FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }
        .logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .logo-mark {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #FF6B9D, #A78BFA);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.75rem;
        }
        .logo-mark img { width: 34px; height: 34px; filter: brightness(0) invert(1); }
        .logo h1 { font-size: 1.25rem; font-weight: 700; color: #2D3142; }
        .logo p { font-size: 0.82rem; color: #9CA3AF; margin-top: 0.25rem; }
        .form-group { margin-bottom: 1.1rem; }
        label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 0.45rem; }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #E5E7EB;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #2D3142;
            transition: border-color 0.15s;
            outline: none;
        }
        input:focus { border-color: #FF6B9D; }
        .btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #FF6B9D, #A78BFA);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: opacity 0.15s, transform 0.15s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error {
            display: none;
            background: #FEF2F2;
            border: 1px solid #FECACA;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.85rem;
            color: #DC2626;
            margin-bottom: 1rem;
        }
        .error.visible { display: block; }
        .hint {
            margin-top: 1.5rem;
            font-size: 0.78rem;
            color: #9CA3AF;
            text-align: center;
            line-height: 1.6;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 0.4rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-mark">
                <img src="/favicon.svg" alt="Neco">
            </div>
            <h1>Neco 管理者ログイン</h1>
            <p>ユーザーへの返信・メッセージ管理</p>
        </div>

        <div class="error" id="error-msg" role="alert"></div>

        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input type="email" id="email" placeholder="neco-system@neco.jp" autocomplete="email" inputmode="email">
        </div>
        <div class="form-group">
            <label for="password">パスワード</label>
            <input type="password" id="password" placeholder="管理者パスワード" autocomplete="current-password">
        </div>

        <button class="btn" id="login-btn" onclick="doLogin()">ログイン</button>

        <p class="hint">
            パスワードは Netlify 環境変数 <strong>NECO_ADMIN_PASSWORD</strong> で設定し、<br>
            <code>/api/admin/db-init</code> を実行すると反映されます。
        </p>
    </div>

    <script>
        // Already logged in as admin → redirect
        (function() {
            const u = localStorage.getItem('neco_user');
            if (!u) return;
            try {
                const user = JSON.parse(u);
                if (user.type === 'admin') window.location.replace('/admin-messages.html');
            } catch (_) {}
        })();

        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('login-btn');
            const errEl    = document.getElementById('error-msg');

            errEl.classList.remove('visible');

            if (!email || !password) {
                errEl.textContent = 'メールアドレスとパスワードを入力してください';
                errEl.classList.add('visible');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>ログイン中...';

            try {
                const res  = await fetch('/.netlify/functions/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email, password }),
                });
                const data = await res.json();

                if (!res.ok || !data.ok) {
                    errEl.textContent = data.error || 'ログインに失敗しました';
                    errEl.classList.add('visible');
                    btn.disabled = false;
                    btn.textContent = 'ログイン';
                    return;
                }

                if (data.user.type !== 'admin') {
                    errEl.textContent = '管理者アカウントではありません';
                    errEl.classList.add('visible');
                    btn.disabled = false;
                    btn.textContent = 'ログイン';
                    return;
                }

                localStorage.setItem('neco_token', data.token);
                localStorage.setItem('neco_user', JSON.stringify(data.user));
                window.location.replace('/admin-messages.html');
            } catch (_) {
                errEl.textContent = '通信エラーが発生しました。ネットワーク接続をご確認ください。';
                errEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'ログイン';
            }
        }
    </script>
</body>
</html>
