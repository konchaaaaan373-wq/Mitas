[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content-Security-Policy – restricts sources for scripts, styles, etc.
    # Adjust as needed if you add third-party integrations.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com https://*.netlify.app https://*.googleapis.com https://scdn.line-apps.com https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://*.supabase.co; upgrade-insecure-requests;"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[redirects]]
  from = "http://necofindjob.com/*"
  to = "https://necofindjob.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.necofindjob.com/*"
  to = "https://necofindjob.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/neco-medical-jobs"
  to = "/"
  status = 301

[[redirects]]
  from = "/neco-medical-jobs.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/neco-medical-jobs%20(1).html"
  to = "/"
  status = 301

# ルートアクセス時はサービストップを表示（リライト：URLは / のまま）
[[redirects]]
  from = "/"
  to = "/service.html"
  status = 200

[[redirects]]
  from = "/api/line/webhook"
  to = "/.netlify/functions/line-webhook"
  status = 200

# Auth API
[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth/:splat"
  status = 200

# Users API – 登録・プロフィール管理
[[redirects]]
  from = "/api/users/*"
  to = "/.netlify/functions/users/:splat"
  status = 200

# Jobs API – 求人情報
[[redirects]]
  from = "/api/jobs/*"
  to = "/.netlify/functions/jobs/:splat"
  status = 200

[[redirects]]
  from = "/api/jobs"
  to = "/.netlify/functions/jobs"
  status = 200

# Applications API – 応募管理
[[redirects]]
  from = "/api/applications/*"
  to = "/.netlify/functions/applications/:splat"
  status = 200

[[redirects]]
  from = "/api/applications"
  to = "/.netlify/functions/applications"
  status = 200

# Messages API – メッセージ機能
[[redirects]]
  from = "/api/messages/*"
  to = "/.netlify/functions/messages/:splat"
  status = 200

# Admin API – DB 初期化（ADMIN_SECRET 環境変数で保護）
[[redirects]]
  from = "/api/admin/db-init"
  to = "/.netlify/functions/db-init"
  status = 200

# Admin API – 統計ダッシュボード（ADMIN_SECRET 環境変数で保護）
[[redirects]]
  from = "/api/admin/stats"
  to = "/.netlify/functions/admin-stats"
  status = 200

# 病院ログイン API
[[redirects]]
  from = "/api/hospital/login"
  to = "/.netlify/functions/hospital-login"
  status = 200

# 病院案件一覧 API
[[redirects]]
  from = "/api/hospital/cases"
  to = "/.netlify/functions/hospital-cases"
  status = 200

# 病院候補者一覧 API
[[redirects]]
  from = "/api/hospital/candidates"
  to = "/.netlify/functions/hospital-candidates"
  status = 200

# Protected pages – redirect to login if accessed directly (handled client-side too)
# These are informational; the actual auth check is done in JavaScript.
[[redirects]]
  from = "/dashboard.html"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/medical-dashboard.html"
  to = "/medical-dashboard.html"
  status = 200

[[redirects]]
  from = "/login.html"
  to = "/login.html"
  status = 200
