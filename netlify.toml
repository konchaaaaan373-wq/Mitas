[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Content-Security-Policy – restricts sources for scripts, styles, etc.
    # Adjust as needed if you add third-party integrations.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com https://*.netlify.app https://*.googleapis.com https://scdn.line-apps.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[redirects]]
  from = "http://necofindjob.com/*"
  to = "https://necofindjob.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.necofindjob.com/*"
  to = "https://necofindjob.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/neco-medical-jobs"
  to = "/"
  status = 301

[[redirects]]
  from = "/neco-medical-jobs.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/neco-medical-jobs%20(1).html"
  to = "/"
  status = 301

[[redirects]]
  from = "/api/line/webhook"
  to = "/.netlify/functions/line-webhook"
  status = 200

# Auth API – routes /api/auth/* to the auth Netlify Function
[[redirects]]
  from = "/api/auth/*"
  to = "/.netlify/functions/auth/:splat"
  status = 200

# Protected pages – redirect to login if accessed directly (handled client-side too)
# These are informational; the actual auth check is done in JavaScript.
[[redirects]]
  from = "/dashboard.html"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/medical-dashboard.html"
  to = "/medical-dashboard.html"
  status = 200
