<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダッシュボード（医療機関） - Neco</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4ECDC4;
            --primary-dark: #3ab5ad;
            --secondary: #FF6B9D;
            --purple: #A78BFA;
            --blue: #4CC9F0;
            --dark: #2D3142;
            --light: #F8F9FA;
            --white: #FFFFFF;
            --border: #E5E7EB;
            --gray-100: #F3F4F6;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-700: #374151;
            --sidebar-w: 300px;
            --header-h: 64px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--dark);
            background: var(--light);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        .app-header {
            height: var(--header-h);
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            gap: 1rem;
            flex-shrink: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(0,0,0,0.06);
        }

        .header-logo {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #4ECDC4, #4CC9F0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            flex-shrink: 0;
        }

        .header-badge {
            padding: 0.25rem 0.75rem;
            background: linear-gradient(135deg, #4ECDC4, #4CC9F0);
            color: var(--white);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .header-spacer { flex: 1; }

        .header-user {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-profile-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            padding: 0.35rem 0.6rem;
            border-radius: 10px;
            transition: background 0.15s;
        }
        .header-profile-link:hover { background: var(--gray-100); }

        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--white);
            flex-shrink: 0;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--dark);
        }

        .user-role {
            font-size: 0.75rem;
            color: var(--gray-400);
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            background: none;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--gray-500);
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ===== CAT MENU ===== */
        .cat-menu { position: relative; }
        .cat-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .cat-menu-btn:hover,
        .cat-menu-btn.active { background: rgba(78, 205, 196, 0.1); }
        .cat-menu-icon-svg { width: 36px; height: 36px; display: block; }
        @keyframes catMenuIn {
            from { opacity: 0; transform: translateY(-6px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .cat-menu-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 230px;
            background: #fff;
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            box-shadow: 0 8px 28px rgba(0,0,0,0.13);
            overflow: hidden;
            z-index: 200;
        }
        .cat-menu-dropdown.open { display: block; animation: catMenuIn 0.18s ease; }
        .cat-menu-header-area {
            padding: 14px 16px 12px;
            background: linear-gradient(135deg, rgba(78,205,196,0.1) 0%, rgba(76,201,240,0.1) 100%);
        }
        .cat-menu-user-name { font-weight: 700; font-size: 0.9rem; color: #1a1a2e; }
        .cat-menu-user-role { font-size: 0.78rem; color: #6B7280; margin-top: 2px; }
        .cat-menu-divider { margin: 0; border: none; border-top: 1px solid #F3F4F6; }
        .cat-menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            font-size: 0.875rem;
            color: #374151;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .cat-menu-item:hover { background: #F9FAFB; }
        .cat-menu-item.cat-menu-logout { color: #EF4444; }
        .cat-menu-item.cat-menu-logout:hover { background: rgba(239, 68, 68, 0.06); }
        .cat-menu-item-icon { font-size: 1rem; width: 22px; text-align: center; flex-shrink: 0; }
        .cat-menu-header-link {
            display: block;
            text-decoration: none;
            transition: background 0.15s;
            cursor: pointer;
        }
        .cat-menu-header-link:hover { background: rgba(78, 205, 196, 0.1); }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.4rem;
            color: var(--dark);
            font-size: 1.3rem;
        }

        /* ===== MAIN LAYOUT ===== */
        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--dark);
        }

        .unread-total-badge {
            background: var(--primary);
            color: var(--white);
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            min-width: 20px;
            text-align: center;
        }

        .conv-list {
            overflow-y: auto;
            flex: 1;
        }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: background 0.15s ease;
            border-bottom: 1px solid var(--gray-100);
        }

        .conv-item:hover { background: var(--gray-100); }

        .conv-item.active {
            background: linear-gradient(90deg, rgba(78,205,196,0.08), rgba(76,201,240,0.04));
            border-left: 3px solid var(--primary);
        }

        .conv-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--white);
            flex-shrink: 0;
        }

        .conv-info { flex: 1; overflow: hidden; }

        .conv-name {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .conv-sub {
            font-size: 0.75rem;
            color: var(--gray-400);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-preview {
            font-size: 0.78rem;
            color: var(--gray-400);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .conv-time {
            font-size: 0.72rem;
            color: var(--gray-400);
            white-space: nowrap;
        }

        .unread-badge {
            background: var(--primary);
            color: var(--white);
            border-radius: 10px;
            font-size: 0.68rem;
            font-weight: 700;
            padding: 0.1rem 0.45rem;
            min-width: 18px;
            text-align: center;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--light);
        }

        /* Candidates banner */
        .candidates-banner {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            overflow-x: auto;
            flex-shrink: 0;
            scrollbar-width: none;
        }

        .candidates-banner::-webkit-scrollbar { display: none; }

        .banner-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--gray-400);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .candidate-chip {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.85rem;
            background: var(--light);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--dark);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .candidate-chip:hover {
            border-color: var(--primary);
            background: rgba(78, 205, 196, 0.05);
        }

        .chip-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ===== CHAT AREA ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--white);
        }

        .chat-header-info { flex: 1; }

        .chat-header-name {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--dark);
        }

        .chat-header-sub {
            font-size: 0.78rem;
            color: var(--gray-400);
        }

        /* Doctor profile pill in header */
        .doctor-profile-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.85rem;
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.78rem;
            color: var(--gray-700);
            flex-shrink: 0;
            white-space: nowrap;
        }

        .pill-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
        }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scroll-behavior: smooth;
        }

        .date-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--gray-400);
            font-size: 0.75rem;
            margin: 0.5rem 0;
        }

        .date-divider::before,
        .date-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 72%;
        }

        .message.own {
            flex-direction: row-reverse;
            align-self: flex-end;
        }

        .message.other { align-self: flex-start; }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--white);
            flex-shrink: 0;
            align-self: flex-end;
        }

        .msg-content { display: flex; flex-direction: column; gap: 0.3rem; }

        .message.own .msg-content { align-items: flex-end; }

        .msg-sender {
            font-size: 0.75rem;
            color: var(--gray-400);
            font-weight: 500;
        }

        .msg-bubble {
            padding: 0.75rem 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
            word-break: break-word;
            max-width: 100%;
        }

        /* Medical institution messages are teal */
        .message.own .msg-bubble {
            background: linear-gradient(135deg, #4ECDC4, #4CC9F0);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        .message.other .msg-bubble {
            background: var(--white);
            color: var(--dark);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .msg-time {
            font-size: 0.7rem;
            color: var(--gray-400);
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            padding: 0.75rem 1rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--gray-400);
            animation: typingBounce 1.2s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            background: var(--white);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            min-height: 44px;
            max-height: 140px;
            padding: 0.65rem 1rem;
            border: 2px solid var(--border);
            border-radius: 22px;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.9rem;
            color: var(--dark);
            background: var(--light);
            resize: none;
            outline: none;
            transition: border-color 0.2s ease;
            overflow-y: auto;
            line-height: 1.5;
        }

        .message-input:focus {
            border-color: var(--primary);
            background: var(--white);
        }

        .message-input::placeholder { color: #C4C9D4; }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #4ECDC4, #4CC9F0);
            color: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 4px 14px rgba(78, 205, 196, 0.45);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== EMPTY STATE ===== */
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--gray-400);
            padding: 2rem;
            text-align: center;
        }

        .empty-chat-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-chat h3 {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gray-500);
            margin-bottom: 0.5rem;
        }

        .empty-chat p {
            font-size: 0.875rem;
            line-height: 1.6;
        }

        /* ===== SCOUT BUTTON in empty state ===== */
        .scout-cta {
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #4ECDC4, #4CC9F0);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .scout-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(78, 205, 196, 0.4);
        }

        /* ===== MOBILE OVERLAY ===== */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .mobile-menu-btn { display: block; }

            .sidebar {
                position: fixed;
                top: var(--header-h);
                left: 0;
                bottom: 0;
                width: 280px;
                z-index: 300;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.open { transform: translateX(0); }

            .sidebar-overlay.open { display: block; }

            .candidates-banner { padding: 0.6rem 1rem; }
            .chat-header { padding: 0.85rem 1rem; }
            .doctor-profile-pill { display: none; }
            .messages-container { padding: 1rem; }
            .message { max-width: 88%; }
            .input-area { padding: 0.75rem 1rem; }
            .user-name, .user-role { display: none; }
            .header-badge { display: none; }
        }

        a:focus-visible, button:focus-visible, textarea:focus-visible {
            outline: 3px solid var(--blue);
            outline-offset: 2px;
        }
    </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="app-header" role="banner">
    <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="会話リストを開く" aria-expanded="false" id="menu-btn">
        ☰
    </button>
    <a href="/" class="header-logo" aria-label="Neco トップページ">Neco</a>
    <span class="header-badge">医療機関</span>

    <div class="header-spacer"></div>

    <div class="cat-menu" id="catMenu">
        <button class="cat-menu-btn" id="catMenuBtn" aria-haspopup="true" aria-expanded="false" aria-label="メニューを開く">
            <svg class="cat-menu-icon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" aria-hidden="true">
                <defs>
                    <linearGradient id="catMenuGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="#4ECDC4"/>
                        <stop offset="100%" stop-color="#4CC9F0"/>
                    </linearGradient>
                </defs>
                <path d="M 20 35 Q 29 35 32 28 L 32 20 L 29 8 L 23 16 Q 21.5 14.5 20 14.5 Q 18.5 14.5 17 16 L 11 8 L 8 20 L 8 28 Q 11 35 20 35 Z"
                      stroke="url(#catMenuGrad)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
            </svg>
        </button>
        <div class="cat-menu-dropdown" id="catMenuDropdown" role="menu">
            <a href="/profile-medical.html" class="cat-menu-header-area cat-menu-header-link" role="menuitem" aria-label="施設プロフィール設定">
                <div class="cat-menu-user-name" id="menu-user-name">さくら在宅クリニック</div>
                <div class="cat-menu-user-role" id="menu-user-role">在宅医療クリニック</div>
            </a>
            <hr class="cat-menu-divider">
            <a href="/medical-dashboard.html" class="cat-menu-item" role="menuitem">
                <span class="cat-menu-item-icon">💬</span>
                <span>メッセージ</span>
            </a>
            <a href="/profile-medical.html" class="cat-menu-item" role="menuitem">
                <span class="cat-menu-item-icon">🏥</span>
                <span>施設プロフィール設定</span>
            </a>
            <hr class="cat-menu-divider">
            <button class="cat-menu-item cat-menu-logout" role="menuitem" onclick="logout()">
                <span class="cat-menu-item-icon">🚪</span>
                <span>ログアウト</span>
            </button>
        </div>
    </div>
</header>

<!-- ===== MAIN ===== -->
<div class="app-body">
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar: doctor conversation list -->
    <aside class="sidebar" id="sidebar" aria-label="医師との会話リスト">
        <div class="sidebar-header">
            <span class="sidebar-title">💬 医師とのメッセージ</span>
            <span class="unread-total-badge" id="total-unread" aria-label="未読メッセージ数">0</span>
        </div>
        <div class="conv-list" id="conv-list" role="list" aria-label="会話一覧">
            <!-- Populated by JS -->
        </div>
    </aside>

    <!-- Main chat area -->
    <main class="main-content" role="main">
        <!-- Matched candidates banner -->
        <div class="candidates-banner" aria-label="マッチング済みの医師候補">
            <span class="banner-label">マッチング候補：</span>
            <!-- Populated by JS -->
        </div>

        <!-- Chat -->
        <div class="chat-area" id="chat-area">
            <div class="empty-chat" id="empty-state">
                <div class="empty-chat-icon" aria-hidden="true">👨‍⚕️</div>
                <h3>医師とメッセージを始めましょう</h3>
                <p>左のリストから医師を選んで<br>メッセージを送りましょう</p>
                <button class="scout-cta" onclick="openConversation(CONVERSATIONS[0].id)">
                    田中先生にメッセージを送る
                </button>
            </div>
        </div>
    </main>
</div>

<script>
// -----------------------------------------------------------------------
// 0. Auth guard
// -----------------------------------------------------------------------
let currentUser = null;

(function initAuth() {
    try {
        const token   = localStorage.getItem('neco_token');
        const userStr = localStorage.getItem('neco_user');
        if (!token || !userStr) throw new Error('no session');

        currentUser = JSON.parse(userStr);
        if (!currentUser || currentUser.type !== 'medical') throw new Error('wrong type');

        const _nameEl = document.getElementById('menu-user-name');
        const _roleEl = document.getElementById('menu-user-role');
        if (_nameEl) _nameEl.textContent = currentUser.name;
        if (_roleEl) _roleEl.textContent = currentUser.facilityType || '医療機関';
    } catch (_) {
        window.location.replace('/login-medical.html');
    }
})();

// -----------------------------------------------------------------------
// 1. Demo data (from the medical institution's perspective)
// -----------------------------------------------------------------------
const CONVERSATIONS = [
    {
        id: 'conv_dr-001_mc-001',
        doctorId: 'dr-001',
        doctorName: '田中 太郎 先生',
        doctorNameShort: '田中 太郎',
        specialty: '内科 / 在宅医療',
        experience: '8年',
        prefecture: '東京都',
        available: '土・日',
        avatarColor: '#FF6B9D',
        avatarInitial: '田',
        jobTitle: '内科外来 週1〜2回',
    },
    {
        id: 'conv_dr-002_mc-001',
        doctorId: 'dr-002',
        doctorName: '佐藤 美咲 先生',
        doctorNameShort: '佐藤 美咲',
        specialty: '総合診療 / 緩和ケア',
        experience: '12年',
        prefecture: '神奈川県',
        available: '月・水・金',
        avatarColor: '#A78BFA',
        avatarInitial: '佐',
        jobTitle: '総合診療 週2〜3回',
    },
];

const DEMO_MESSAGES = {
    'conv_dr-001_mc-001': [
        {
            id: 'msg-001', senderId: 'mc-001', senderName: 'さくら在宅クリニック',
            senderType: 'medical', text: 'はじめまして。Necoを通じてご連絡させていただきました。内科外来の非常勤医師を探しており、先生のご経歴に大変興味を持ちました。よろしければ詳細をお話しできればと思います。',
            timestamp: getTimestamp(-120), read: true,
        },
        {
            id: 'msg-002', senderId: 'dr-001', senderName: '田中 太郎',
            senderType: 'doctor', text: 'ご連絡ありがとうございます。詳細をお聞かせいただけますか？特に勤務日時と報酬について確認させてください。',
            timestamp: getTimestamp(-90), read: true,
        },
        {
            id: 'msg-003', senderId: 'mc-001', senderName: 'さくら在宅クリニック',
            senderType: 'medical', text: '週1〜2回（土日優先）、1回5〜6時間の外来診療をお願いしております。報酬は時給換算で5〜6万円を想定しています。在宅医療の経験が豊富な先生を探しておりますので、ぜひご検討ください。',
            timestamp: getTimestamp(-60), read: true,
        },
        {
            id: 'msg-004', senderId: 'dr-001', senderName: '田中 太郎',
            senderType: 'doctor', text: '承知しました。土曜日であれば勤務が可能です。一度、施設の見学をさせていただくことは可能でしょうか？',
            timestamp: getTimestamp(-45), read: false,
        },
    ],
    'conv_dr-002_mc-001': [
        {
            id: 'msg-005', senderId: 'mc-001', senderName: 'さくら在宅クリニック',
            senderType: 'medical', text: '佐藤先生、はじめまして。Necoでご紹介いただきました。緩和ケアのご経験について詳しく教えていただけますか？',
            timestamp: getTimestamp(-72 * 60), read: true,
        },
        {
            id: 'msg-006', senderId: 'dr-002', senderName: '佐藤 美咲',
            senderType: 'doctor', text: 'ご連絡ありがとうございます。慶應義塾大学病院で12年間、緩和ケアチームに所属し、終末期患者様のケアに携わってきました。在宅での緩和ケアにも積極的に取り組みたいと考えています。',
            timestamp: getTimestamp(-70 * 60), read: true,
        },
    ],
};

function getTimestamp(minutesAgo) {
    return new Date(Date.now() + minutesAgo * 60 * 1000).toISOString();
}

function getStorageKey(convId) {
    return `neco_messages_${convId}`;
}

function loadMessages(convId) {
    const stored = localStorage.getItem(getStorageKey(convId));
    if (stored) {
        try { return JSON.parse(stored); } catch (_) {}
    }
    const demo = DEMO_MESSAGES[convId] || [];
    localStorage.setItem(getStorageKey(convId), JSON.stringify(demo));
    return demo;
}

function saveMessages(convId, messages) {
    localStorage.setItem(getStorageKey(convId), JSON.stringify(messages));
}

function markRead(convId) {
    const msgs = loadMessages(convId);
    const updated = msgs.map(m =>
        m.senderId !== (currentUser && currentUser.id) ? { ...m, read: true } : m
    );
    saveMessages(convId, updated);
}

function getUnreadCount(convId) {
    const msgs = loadMessages(convId);
    return msgs.filter(m => m.senderId !== (currentUser && currentUser.id) && !m.read).length;
}

function formatTime(isoStr) {
    const d = new Date(isoStr);
    const now = new Date();
    const diffMs = now - d;
    const diffDays = Math.floor(diffMs / 86400000);
    if (diffDays === 0) return d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    if (diffDays === 1) return '昨日';
    if (diffDays < 7) return `${diffDays}日前`;
    return d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
}

function formatDateHeader(isoStr) {
    const d = new Date(isoStr);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) return '今日';
    const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
    if (d.toDateString() === yesterday.toDateString()) return '昨日';
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
}

function escapeHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// -----------------------------------------------------------------------
// 2. Render sidebar
// -----------------------------------------------------------------------
let activeConvId = null;

function renderSidebar() {
    const convList = document.getElementById('conv-list');
    convList.innerHTML = '';
    let totalUnread = 0;

    CONVERSATIONS.forEach(conv => {
        const msgs = loadMessages(conv.id);
        const lastMsg = msgs[msgs.length - 1];
        const unread = getUnreadCount(conv.id);
        totalUnread += unread;

        const item = document.createElement('div');
        item.className = `conv-item${activeConvId === conv.id ? ' active' : ''}`;
        item.setAttribute('role', 'listitem');
        item.setAttribute('tabindex', '0');
        item.setAttribute('aria-label', `${conv.doctorName}との会話${unread > 0 ? `、未読${unread}件` : ''}`);
        item.innerHTML = `
            <div class="conv-avatar" style="background: ${escapeHtml(conv.avatarColor)}" aria-hidden="true">${escapeHtml(conv.avatarInitial)}</div>
            <div class="conv-info">
                <div class="conv-name">${escapeHtml(conv.doctorName)}</div>
                <div class="conv-sub">${escapeHtml(conv.specialty)}</div>
                <div class="conv-preview">${escapeHtml(lastMsg ? lastMsg.text.slice(0, 28) + (lastMsg.text.length > 28 ? '…' : '') : 'メッセージなし')}</div>
            </div>
            <div class="conv-meta">
                <div class="conv-time">${lastMsg ? formatTime(lastMsg.timestamp) : ''}</div>
                ${unread > 0 ? `<div class="unread-badge" aria-label="未読${unread}件">${unread}</div>` : ''}
            </div>
        `;
        item.onclick = () => openConversation(conv.id);
        item.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') openConversation(conv.id); };
        convList.appendChild(item);
    });

    const badge = document.getElementById('total-unread');
    badge.textContent = totalUnread;
    badge.style.display = totalUnread > 0 ? '' : 'none';
}

// -----------------------------------------------------------------------
// 3. Render candidates banner
// -----------------------------------------------------------------------
function renderCandidatesBanner() {
    const banner = document.querySelector('.candidates-banner');

    CONVERSATIONS.forEach(conv => {
        const chip = document.createElement('button');
        chip.className = 'candidate-chip';
        chip.setAttribute('aria-label', `${conv.doctorName}: ${conv.specialty}`);
        chip.innerHTML = `
            <span class="chip-dot" style="background: ${escapeHtml(conv.avatarColor)}" aria-hidden="true"></span>
            <strong>${escapeHtml(conv.doctorNameShort)}</strong>・${escapeHtml(conv.specialty)}・${escapeHtml(conv.experience)}
        `;
        chip.onclick = () => openConversation(conv.id);
        banner.appendChild(chip);
    });
}

// -----------------------------------------------------------------------
// 4. Open a conversation
// -----------------------------------------------------------------------
function openConversation(convId) {
    activeConvId = convId;
    markRead(convId);

    const conv = CONVERSATIONS.find(c => c.id === convId);
    if (!conv) return;

    renderSidebar();

    const chatArea = document.getElementById('chat-area');
    chatArea.innerHTML = `
        <div class="chat-header">
            <div class="chat-header-avatar" style="background: ${escapeHtml(conv.avatarColor)}" aria-hidden="true">${escapeHtml(conv.avatarInitial)}</div>
            <div class="chat-header-info">
                <div class="chat-header-name">${escapeHtml(conv.doctorName)}</div>
                <div class="chat-header-sub">${escapeHtml(conv.specialty)} · 経験${escapeHtml(conv.experience)} · ${escapeHtml(conv.prefecture)}</div>
            </div>
            <div class="doctor-profile-pill">
                <span class="pill-dot" aria-hidden="true"></span>
                勤務可能：${escapeHtml(conv.available)}
            </div>
        </div>
        <div class="messages-container" id="messages-container" aria-label="メッセージ一覧" aria-live="polite">
        </div>
        <div class="typing-indicator" id="typing-indicator" aria-live="polite" aria-label="相手が入力中">
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
        <div class="input-area">
            <textarea
                class="message-input"
                id="message-input"
                placeholder="${escapeHtml(conv.doctorName)}にメッセージを送る..."
                aria-label="メッセージ入力"
                rows="1"
                maxlength="1000"
            ></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="送信" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    `;

    renderMessages(convId);
    setupInputHandlers(convId);

    if (window.innerWidth <= 768) closeSidebar();
}

// -----------------------------------------------------------------------
// 5. Render messages
// -----------------------------------------------------------------------
function renderMessages(convId) {
    const container = document.getElementById('messages-container');
    if (!container) return;

    const messages = loadMessages(convId);
    container.innerHTML = '';

    let lastDateStr = '';

    messages.forEach(msg => {
        const dateStr = formatDateHeader(msg.timestamp);
        if (dateStr !== lastDateStr) {
            const divider = document.createElement('div');
            divider.className = 'date-divider';
            divider.setAttribute('aria-label', dateStr);
            divider.textContent = dateStr;
            container.appendChild(divider);
            lastDateStr = dateStr;
        }

        const isOwn = msg.senderId === (currentUser && currentUser.id);
        const conv = CONVERSATIONS.find(c => c.id === convId);
        const otherColor = conv ? conv.avatarColor : '#FF6B9D';
        const otherInitial = conv ? conv.avatarInitial : msg.senderName.charAt(0);

        const wrapper = document.createElement('div');
        wrapper.className = `message ${isOwn ? 'own' : 'other'}`;
        wrapper.innerHTML = `
            ${!isOwn ? `<div class="msg-avatar" style="background: ${escapeHtml(otherColor)}" aria-hidden="true">${escapeHtml(otherInitial)}</div>` : ''}
            <div class="msg-content">
                ${!isOwn ? `<span class="msg-sender">${escapeHtml(msg.senderName)}</span>` : ''}
                <div class="msg-bubble">${escapeHtml(msg.text).replace(/\n/g, '<br>')}</div>
                <span class="msg-time">${formatTime(msg.timestamp)}</span>
            </div>
            ${isOwn ? `<div class="msg-avatar" style="background: ${escapeHtml(currentUser.avatarColor || '#4ECDC4')}" aria-hidden="true">${escapeHtml(currentUser.avatarInitial || currentUser.name.charAt(0))}</div>` : ''}
        `;
        container.appendChild(wrapper);
    });

    setTimeout(() => { container.scrollTop = container.scrollHeight; }, 0);
}

// -----------------------------------------------------------------------
// 6. Input handlers and send
// -----------------------------------------------------------------------
function setupInputHandlers(convId) {
    const input   = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    if (!input || !sendBtn) return;

    input.addEventListener('input', () => {
        sendBtn.disabled = input.value.trim().length === 0;
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 140) + 'px';
    });

    input.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            if (!sendBtn.disabled) sendMessage();
        }
    });
}

function sendMessage() {
    if (!activeConvId || !currentUser) return;

    const input   = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const text = input.value.trim();
    if (!text) return;

    const newMsg = {
        id: `msg-${Date.now()}`,
        senderId:   currentUser.id,
        senderName: currentUser.name,
        senderType: currentUser.type,
        text,
        timestamp: new Date().toISOString(),
        read: false,
    };

    const msgs = loadMessages(activeConvId);
    msgs.push(newMsg);
    saveMessages(activeConvId, msgs);

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    renderMessages(activeConvId);
    renderSidebar();

    scheduleAutoReply(activeConvId);
}

// -----------------------------------------------------------------------
// 7. Demo auto-reply (simulates the doctor responding)
// -----------------------------------------------------------------------
const AUTO_REPLIES = {
    'conv_dr-001_mc-001': [
        'ご連絡ありがとうございます。ぜひ詳細を聞かせてください。',
        '承知しました。確認してご連絡いたします。',
        'その条件であれば問題ありません。前向きに検討いたします。',
        '施設見学の日程について、来週はいかがでしょうか？',
        'ご丁寧にありがとうございます。在宅医療への思いを大切にしながら取り組みたいと思います。',
    ],
    'conv_dr-002_mc-001': [
        'ご連絡ありがとうございます。詳細をお聞かせください。',
        '承知しました。ご要望に応えられるよう努力いたします。',
        '緩和ケアへの理解が深い施設で働くことに興味があります。',
        'スケジュールを確認してご連絡いたします。',
    ],
};

let autoReplyTimers = {};

function scheduleAutoReply(convId) {
    if (autoReplyTimers[convId]) return;

    const conv = CONVERSATIONS.find(c => c.id === convId);
    if (!conv) return;

    const replies = AUTO_REPLIES[convId] || AUTO_REPLIES['conv_dr-001_mc-001'];
    const reply = replies[Math.floor(Math.random() * replies.length)];

    const typingIndicator = document.getElementById('typing-indicator');

    autoReplyTimers[convId] = setTimeout(() => {
        if (activeConvId !== convId) {
            delete autoReplyTimers[convId];
            return;
        }

        if (typingIndicator) typingIndicator.style.display = 'block';
        const container = document.getElementById('messages-container');
        if (container) container.scrollTop = container.scrollHeight;

        setTimeout(() => {
            if (typingIndicator) typingIndicator.style.display = 'none';
            delete autoReplyTimers[convId];

            if (activeConvId !== convId) return;

            const autoMsg = {
                id: `auto-${Date.now()}`,
                senderId:   conv.doctorId,
                senderName: conv.doctorNameShort,
                senderType: 'doctor',
                text: reply,
                timestamp: new Date().toISOString(),
                read: true,
            };

            const msgs = loadMessages(convId);
            msgs.push(autoMsg);
            saveMessages(convId, msgs);

            renderMessages(convId);
            renderSidebar();
        }, 2200);
    }, 1400);
}

// -----------------------------------------------------------------------
// 8. Mobile sidebar toggle
// -----------------------------------------------------------------------
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const menuBtn = document.getElementById('menu-btn');
    const isOpen  = sidebar.classList.contains('open');
    sidebar.classList.toggle('open', !isOpen);
    overlay.classList.toggle('open', !isOpen);
    menuBtn.setAttribute('aria-expanded', String(!isOpen));
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
    document.getElementById('menu-btn').setAttribute('aria-expanded', 'false');
}

// -----------------------------------------------------------------------
// 9. Logout
// -----------------------------------------------------------------------
function logout() {
    if (!confirm('ログアウトしますか？')) return;
    localStorage.removeItem('neco_token');
    localStorage.removeItem('neco_user');
    window.location.replace('/login-medical.html');
}

// -----------------------------------------------------------------------
// 10. Init
// -----------------------------------------------------------------------
renderSidebar();
renderCandidatesBanner();

if (window.innerWidth > 768 && CONVERSATIONS.length > 0) {
    openConversation(CONVERSATIONS[0].id);
}

// Cat menu toggle
(function() {
    const btn = document.getElementById('catMenuBtn');
    const menu = document.getElementById('catMenuDropdown');
    if (!btn || !menu) return;
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const open = menu.classList.toggle('open');
        btn.classList.toggle('active', open);
        btn.setAttribute('aria-expanded', String(open));
    });
    document.addEventListener('click', function() {
        menu.classList.remove('open');
        btn.classList.remove('active');
        btn.setAttribute('aria-expanded', 'false');
    });
    menu.addEventListener('click', function(e) { e.stopPropagation(); });
})();
</script>
</body>
</html>
