<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cat head silhouette -->
  <g fill="#FF6B9D">
    <!-- Main head -->
    <circle cx="16" cy="18" r="10"/>

    <!-- Left ear -->
    <polygon points="8,10 6,2 10,8"/>

    <!-- Right ear -->
    <polygon points="24,10 26,2 22,8"/>

    <!-- Eyes -->
    <circle cx="13" cy="16" r="1.5" fill="white"/>
    <circle cx="19" cy="16" r="1.5" fill="white"/>

    <!-- Mouth/nose area -->
    <circle cx="16" cy="21" r="1" fill="white"/>
    <path d="M 16 21 L 14.5 22.5 M 16 21 L 17.5 22.5" stroke="white" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
