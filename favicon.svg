<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Cat ears -->
  <polygon points="6,13 3,3 11,10" fill="url(#g)"/>
  <polygon points="26,13 29,3 21,10" fill="url(#g)"/>
  <!-- Inner ears -->
  <polygon points="6.5,12 4.5,5.5 10,9.5" fill="rgba(255,255,255,0.35)"/>
  <polygon points="25.5,12 27.5,5.5 22,9.5" fill="rgba(255,255,255,0.35)"/>
  <!-- Cat head -->
  <ellipse cx="16" cy="20" rx="11" ry="10" fill="url(#g)"/>
  <!-- Eyes -->
  <ellipse cx="12" cy="18" rx="2" ry="2.5" fill="white"/>
  <ellipse cx="20" cy="18" rx="2" ry="2.5" fill="white"/>
  <ellipse cx="12" cy="18.6" rx="1" ry="1.5" fill="#2D3142"/>
  <ellipse cx="20" cy="18.6" rx="1" ry="1.5" fill="#2D3142"/>
  <circle cx="12.6" cy="17.8" r="0.45" fill="white"/>
  <circle cx="20.6" cy="17.8" r="0.45" fill="white"/>
  <!-- Nose -->
  <ellipse cx="16" cy="22.5" rx="1.1" ry="0.8" fill="white" opacity="0.85"/>
  <!-- Mouth -->
  <path d="M 15 23.2 Q 16 24.3 17 23.2" stroke="white" stroke-width="0.7" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="5.5" y1="21.5" x2="12.5" y2="22.2" stroke="white" stroke-width="0.6" opacity="0.6"/>
  <line x1="5.5" y1="23" x2="12.5" y2="23.2" stroke="white" stroke-width="0.6" opacity="0.6"/>
  <line x1="19.5" y1="22.2" x2="26.5" y2="21.5" stroke="white" stroke-width="0.6" opacity="0.6"/>
  <line x1="19.5" y1="23.2" x2="26.5" y2="23" stroke="white" stroke-width="0.6" opacity="0.6"/>
</svg>
