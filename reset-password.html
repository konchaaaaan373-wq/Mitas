<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワード再設定 | MITAS 医療機関ポータル</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.__SUPABASE_URL__      = 'https://cztoepghaimofqjnuvou.supabase.co';
    window.__SUPABASE_ANON_KEY__ = 'sb_publishable_Fc1Dp1Daj-GeHRlSmCR4ow_rFahzKql';
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy:      #1B3A6B;
      --navy-deep: #0D2340;
      --teal:      #0EA5E9;
      --gray-900:  #0F172A;
      --gray-700:  #334155;
      --gray-500:  #64748B;
      --gray-300:  #CBD5E1;
      --gray-200:  #E2E8F0;
      --gray-100:  #F1F5F9;
      --gray-50:   #F8FAFC;
      --white:     #FFFFFF;
      --red:       #DC2626;
      --red-bg:    #FEF2F2;
      --green:     #10B981;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #EEF2F7;
      color: var(--gray-700);
      display: flex; flex-direction: column;
      font-size: 14px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .site-header {
      background: var(--navy-deep);
      height: 48px;
      display: flex; align-items: center;
      padding: 0 24px;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .site-header__brand { display: flex; align-items: center; gap: 12px; }
    .site-header__logo  { font-size: 18px; font-weight: 700; letter-spacing: 0.1em; color: var(--white); }
    .site-header__divider { width: 1px; height: 18px; background: rgba(255,255,255,0.25); }
    .site-header__subtitle { font-size: 12px; color: rgba(255,255,255,0.7); }
    .site-header__badge {
      font-size: 11px; background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6); padding: 2px 8px;
      border-radius: 2px; letter-spacing: 0.04em;
    }
    .main {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 40px 16px;
    }
    .card-wrap { width: 100%; max-width: 440px; }
    .card-heading { text-align: center; margin-bottom: 24px; }
    .card-heading__title { font-size: 19px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .card-heading__sub { font-size: 13px; color: var(--gray-500); line-height: 1.7; }
    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-top: 3px solid var(--navy);
      padding: 32px 36px 28px;
    }
    .alert {
      display: none; padding: 10px 14px;
      margin-bottom: 18px; font-size: 13px;
      border-left: 4px solid;
    }
    .alert.show  { display: block; }
    .alert--error   { background: var(--red-bg); border-color: var(--red); color: var(--red); }
    .alert--success { background: #F0FDF4; border-color: var(--green); color: #065F46; }
    .form-group  { margin-bottom: 20px; }
    .form-label  {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--gray-700); margin-bottom: 6px;
    }
    .form-label .required { color: var(--red); margin-left: 4px; font-weight: 400; }
    .form-hint { font-size: 11px; color: var(--gray-500); margin-top: 4px; }
    .password-wrapper { position: relative; }
    .form-input {
      width: 100%; height: 42px; padding: 0 12px;
      border: 1px solid var(--gray-300); border-radius: 3px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
      color: var(--gray-900); background: var(--white);
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    .form-input:focus {
      outline: none; border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
    }
    .form-input.error { border-color: var(--red); }
    .form-input::placeholder { color: var(--gray-300); }
    .password-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--gray-500); padding: 4px; font-size: 13px;
    }
    .password-toggle:hover { color: var(--gray-700); }
    /* パスワード強度インジケーター */
    .strength-bar {
      display: flex; gap: 4px; margin-top: 6px;
    }
    .strength-bar__seg {
      flex: 1; height: 3px; border-radius: 2px;
      background: var(--gray-200);
      transition: background 0.2s;
    }
    .strength-bar__seg.weak   { background: var(--red); }
    .strength-bar__seg.fair   { background: #F59E0B; }
    .strength-bar__seg.good   { background: var(--teal); }
    .strength-bar__seg.strong { background: var(--green); }
    .strength-label {
      font-size: 11px; color: var(--gray-500); margin-top: 3px;
    }
    .btn {
      width: 100%; height: 44px;
      background: var(--navy); color: var(--white); border: none; border-radius: 3px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 600;
      letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s;
      position: relative; margin-top: 8px;
    }
    .btn:hover:not(:disabled) { background: var(--navy-deep); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn .spin {
      display: none; position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .btn.loading .spin { display: block; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .card__footer {
      margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--gray-100);
      text-align: center; font-size: 12px; color: var(--gray-500);
    }
    .card__footer a { color: var(--teal); text-decoration: none; }
    .card__footer a:hover { text-decoration: underline; }
    /* 完了画面 */
    .done-state { display: none; text-align: center; padding: 8px 0; }
    .done-state.show { display: block; }
    .done-state__icon {
      width: 52px; height: 52px; margin: 0 auto 16px;
      background: #F0FDF4; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--green);
    }
    .done-state__title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
    .done-state__body  { font-size: 13px; color: var(--gray-500); line-height: 1.8; margin-bottom: 20px; }
    .done-state .btn { max-width: 200px; margin: 0 auto; display: block; }
    /* リンク切れ状態 */
    .invalid-state { display: none; text-align: center; padding: 12px 0; }
    .invalid-state.show { display: block; }
    .invalid-state__icon {
      width: 52px; height: 52px; margin: 0 auto 16px;
      background: var(--red-bg); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--red);
    }
    .invalid-state__title { font-size: 17px; font-weight: 700; color: var(--gray-900); margin-bottom: 10px; }
    .invalid-state__body  { font-size: 13px; color: var(--gray-500); line-height: 1.8; margin-bottom: 20px; }
    .site-footer {
      background: var(--navy-deep); color: rgba(255,255,255,0.4);
      font-size: 11px; text-align: center; padding: 14px; flex-shrink: 0;
    }
    .site-footer a { color: rgba(255,255,255,0.4); text-decoration: none; }
    .site-footer a:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header__brand">
      <span class="site-header__logo">MITAS</span>
      <div class="site-header__divider"></div>
      <span class="site-header__subtitle">医療機関 管理者ポータル</span>
    </div>
    <span class="site-header__badge">SECURE</span>
  </header>

  <main class="main">
    <div class="card-wrap">
      <div class="card-heading">
        <p class="card-heading__title">新しいパスワードの設定</p>
        <p class="card-heading__sub">新しいパスワードを入力してください。</p>
      </div>

      <div class="card" id="mainCard">
        <div class="alert alert--error" id="errorAlert"></div>

        <!-- パスワード入力フォーム -->
        <div id="formWrap">
          <div class="form-group">
            <label class="form-label" for="newPassword">
              新しいパスワード
              <span class="required">*</span>
            </label>
            <div class="password-wrapper">
              <input class="form-input" type="password" id="newPassword"
                autocomplete="new-password" placeholder="8文字以上" required>
              <button type="button" class="password-toggle" id="toggle1" aria-label="パスワードを表示">表示</button>
            </div>
            <div class="strength-bar" id="strengthBar">
              <div class="strength-bar__seg" id="seg1"></div>
              <div class="strength-bar__seg" id="seg2"></div>
              <div class="strength-bar__seg" id="seg3"></div>
              <div class="strength-bar__seg" id="seg4"></div>
            </div>
            <p class="strength-label" id="strengthLabel"></p>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">
              パスワード（確認）
              <span class="required">*</span>
            </label>
            <div class="password-wrapper">
              <input class="form-input" type="password" id="confirmPassword"
                autocomplete="new-password" placeholder="もう一度入力してください" required>
              <button type="button" class="password-toggle" id="toggle2" aria-label="パスワードを表示">表示</button>
            </div>
          </div>

          <p class="form-hint" style="margin-bottom: 12px;">
            8文字以上、英字・数字・記号を組み合わせることを推奨します。
          </p>

          <button class="btn" id="submitBtn">
            パスワードを変更する
            <span class="spin"></span>
          </button>
        </div>

        <!-- 変更完了 -->
        <div class="done-state" id="doneState">
          <div class="done-state__icon">&#10003;</div>
          <p class="done-state__title">パスワードを変更しました</p>
          <p class="done-state__body">
            新しいパスワードでログインできます。
          </p>
          <a href="/login.html" class="btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
            ログイン画面へ
          </a>
        </div>

        <!-- リンク切れ -->
        <div class="invalid-state" id="invalidState">
          <div class="invalid-state__icon">!</div>
          <p class="invalid-state__title">リンクの有効期限が切れています</p>
          <p class="invalid-state__body">
            このリンクは使用済みか、有効期限（1時間）が過ぎています。<br>
            お手数ですが、再度パスワード再設定をお試しください。
          </p>
          <a href="/forgot-password.html" class="btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center; max-width: 220px; margin: 0 auto;">
            再設定メールを送る
          </a>
        </div>

        <div class="card__footer">
          <a href="/login.html">ログイン画面に戻る</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    &copy; 2025 Neco Inc. &nbsp;|&nbsp;
    <a href="/privacy-policy.html">プライバシーポリシー</a>
    &nbsp;|&nbsp;
    <a href="/terms.html">利用規約</a>
  </footer>

  <script>
    const SUPABASE_URL      = window.__SUPABASE_URL__      || 'https://cztoepghaimofqjnuvou.supabase.co';
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || 'sb_publishable_Fc1Dp1Daj-GeHRlSmCR4ow_rFahzKql';
    const { createClient }  = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const pwInput  = document.getElementById('newPassword');
    const cfInput  = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');

    // パスワード表示切り替え
    function setupToggle(inputId, btnId) {
      const input = document.getElementById(inputId);
      const btn   = document.getElementById(btnId);
      btn.addEventListener('click', () => {
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        btn.textContent = show ? '隠す' : '表示';
      });
    }
    setupToggle('newPassword', 'toggle1');
    setupToggle('confirmPassword', 'toggle2');

    // パスワード強度チェック
    pwInput.addEventListener('input', () => {
      const v = pwInput.value;
      const score = [
        v.length >= 8,
        /[A-Z]/.test(v),
        /[0-9]/.test(v),
        /[^A-Za-z0-9]/.test(v),
      ].filter(Boolean).length;

      const segs = ['seg1','seg2','seg3','seg4'];
      const labels = ['', '弱い', '普通', '強い', '非常に強い'];
      const classes = ['', 'weak', 'fair', 'good', 'strong'];

      segs.forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'strength-bar__seg';
        if (i < score) el.classList.add(classes[score]);
      });
      document.getElementById('strengthLabel').textContent = v.length ? labels[score] : '';
    });

    // URLハッシュから Supabase セッショントークンを検出
    // Supabase はリセットリンクのコールバックを #access_token=...&type=recovery で渡す
    (async function init() {
      const hash = window.location.hash;

      if (hash.includes('type=recovery') || hash.includes('access_token')) {
        // Supabase がハッシュを自動的に処理してセッションを設定する
        const { data, error } = await db.auth.getSession();
        if (error || !data.session) {
          showInvalid();
          return;
        }
        // セッション有効 → フォームを表示（デフォルト状態）
      } else {
        // type=recovery でないアクセスは無効
        showInvalid();
      }
    })();

    submitBtn.addEventListener('click', updatePassword);
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') updatePassword();
    });

    async function updatePassword() {
      const newPw = pwInput.value;
      const cfPw  = cfInput.value;
      errorAlert.classList.remove('show');

      if (!newPw) {
        showError('新しいパスワードを入力してください。');
        return;
      }
      if (newPw.length < 8) {
        showError('パスワードは8文字以上で設定してください。');
        return;
      }
      if (newPw !== cfPw) {
        showError('パスワードが一致しません。');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.classList.add('loading');

      try {
        const { error } = await db.auth.updateUser({ password: newPw });
        if (error) throw error;

        // 変更完了画面を表示
        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('doneState').classList.add('show');
      } catch (err) {
        showError(err.message || 'パスワードの変更に失敗しました。再度お試しください。');
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    }

    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.add('show');
    }

    function showInvalid() {
      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('invalidState').classList.add('show');
    }
  </script>
</body>
</html>
