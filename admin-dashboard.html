<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ダッシュボード - Neco</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:   #FF6B9D;
      --secondary: #4ECDC4;
      --purple:    #A78BFA;
      --blue:      #4CC9F0;
      --green:     #34D399;
      --yellow:    #FBBF24;
      --red:       #F87171;
      --dark:      #2D3142;
      --light:     #F8F9FA;
      --white:     #FFFFFF;
      --border:    #E5E7EB;
      --gray-100:  #F3F4F6;
      --gray-400:  #9CA3AF;
      --gray-500:  #6B7280;
      --gray-700:  #374151;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--dark);
      background: var(--light);
      min-height: 100vh;
    }

    /* ===== LOGIN SCREEN ===== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #FF6B9D22 0%, #A78BFA22 50%, #4CC9F022 100%);
    }

    .login-card {
      background: var(--white);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    .login-logo {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .login-subtitle {
      text-align: center;
      color: var(--gray-500);
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .login-card label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: var(--gray-700);
    }

    .login-card input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.2rem;
    }

    .login-card input:focus { border-color: var(--primary); }

    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: inherit;
    }

    .login-btn:hover { opacity: 0.9; }

    .login-error {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #FEF2F2;
      color: var(--red);
      border-radius: 8px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    /* ===== MAIN DASHBOARD ===== */
    #dashboard {
      display: none;
    }

    .dash-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }

    .dash-logo {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 1.4rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .dash-header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .refresh-btn, .logout-btn {
      padding: 0.45rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      border: none;
      transition: all 0.2s;
    }

    .refresh-btn {
      background: var(--gray-100);
      color: var(--gray-700);
    }

    .refresh-btn:hover { background: var(--border); }

    .logout-btn {
      background: var(--gray-100);
      color: var(--gray-500);
    }

    .logout-btn:hover { background: #FEF2F2; color: var(--red); }

    .last-updated {
      font-size: 0.78rem;
      color: var(--gray-400);
    }

    .dash-main {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ===== SECTION TITLES ===== */
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gray-700);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-title .icon { font-size: 1.1rem; }

    /* ===== KPI CARDS ===== */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .kpi-card {
      background: var(--white);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      border-left: 4px solid var(--border);
      transition: box-shadow 0.2s;
    }

    .kpi-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }

    .kpi-card.pink   { border-color: var(--primary); }
    .kpi-card.teal   { border-color: var(--secondary); }
    .kpi-card.purple { border-color: var(--purple); }
    .kpi-card.blue   { border-color: var(--blue); }
    .kpi-card.green  { border-color: var(--green); }
    .kpi-card.yellow { border-color: var(--yellow); }

    .kpi-label {
      font-size: 0.78rem;
      color: var(--gray-500);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .kpi-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--dark);
      line-height: 1;
    }

    .kpi-sub {
      font-size: 0.75rem;
      color: var(--gray-400);
      margin-top: 0.3rem;
    }

    .kpi-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-left: 0.3rem;
    }

    .badge-week { background: #EFF6FF; color: #3B82F6; }

    /* ===== CHARTS ===== */
    .charts-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 900px) {
      .charts-grid { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--white);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .chart-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--gray-700);
      margin-bottom: 1rem;
    }

    /* Bar chart */
    .bar-chart {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
    }

    .bar-label {
      width: 100px;
      text-align: right;
      color: var(--gray-500);
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-track {
      flex: 1;
      height: 20px;
      background: var(--gray-100);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .bar-count {
      width: 36px;
      text-align: right;
      font-weight: 600;
      color: var(--gray-700);
    }

    /* Mini trend sparkline */
    .sparkline-wrap {
      overflow-x: auto;
    }

    .sparkline-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 80px;
      min-width: 200px;
    }

    .sparkline-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      flex: 1;
      min-width: 12px;
    }

    .sparkline-bar {
      width: 100%;
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      transition: height 0.3s;
    }

    .sparkline-date {
      font-size: 0.55rem;
      color: var(--gray-400);
      transform: rotate(-45deg);
      white-space: nowrap;
    }

    /* Donut-style status ring */
    .status-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem;
      border-radius: 8px;
      background: var(--gray-100);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-label { font-size: 0.75rem; color: var(--gray-500); }
    .status-value { font-size: 0.9rem; font-weight: 700; color: var(--dark); }

    /* ===== TABLES ===== */
    .tables-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 900px) {
      .tables-grid { grid-template-columns: 1fr; }
    }

    .table-card {
      background: var(--white);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .table-card table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .table-card th {
      text-align: left;
      padding: 0.5rem 0.6rem;
      color: var(--gray-500);
      font-weight: 600;
      font-size: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .table-card td {
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid var(--gray-100);
      color: var(--gray-700);
    }

    .table-card tr:last-child td { border-bottom: none; }

    /* Type badges */
    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .badge-doctor  { background: #FDF2F8; color: #DB2777; }
    .badge-nurse   { background: #ECFDF5; color: #059669; }
    .badge-medical { background: #EFF6FF; color: #2563EB; }

    /* Status badges */
    .badge-pending   { background: #FEF9C3; color: #92400E; }
    .badge-reviewing { background: #EFF6FF; color: #1D4ED8; }
    .badge-accepted  { background: #ECFDF5; color: #065F46; }
    .badge-rejected  { background: #FEF2F2; color: #991B1B; }
    .badge-withdrawn { background: var(--gray-100); color: var(--gray-500); }

    /* LINE event badges */
    .badge-follow   { background: #ECFDF5; color: #059669; }
    .badge-unfollow { background: #FEF2F2; color: #991B1B; }
    .badge-message  { background: #EFF6FF; color: #2563EB; }

    /* ===== LOADING ===== */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== RANGE SELECTOR ===== */
    .range-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .range-tab {
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: var(--white);
      cursor: pointer;
      color: var(--gray-500);
      font-family: inherit;
      transition: all 0.2s;
    }

    .range-tab.active {
      background: var(--dark);
      color: white;
      border-color: var(--dark);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      color: var(--gray-400);
      padding: 2rem;
      font-size: 0.85rem;
    }

    /* ===== INLINE TREND MINI BARS ===== */
    .mini-trend {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 24px;
    }

    .mini-bar {
      width: 6px;
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      background: var(--primary);
      opacity: 0.6;
    }
  </style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">neco</div>
    <div class="login-subtitle">管理者ダッシュボード</div>
    <label for="admin-secret">管理者シークレット</label>
    <input type="password" id="admin-secret" placeholder="ADMIN_SECRET を入力" autocomplete="off">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-error" id="login-error">シークレットが正しくありません</div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard">
  <header class="dash-header">
    <span class="dash-logo">neco admin</span>
    <div class="dash-header-right">
      <span class="last-updated" id="last-updated"></span>
      <button class="refresh-btn" onclick="loadStats()">更新</button>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </header>

  <main class="dash-main">

    <!-- 期間選択 -->
    <div class="range-tabs">
      <button class="range-tab active" data-days="7"  onclick="selectRange(this)">7日</button>
      <button class="range-tab"        data-days="14" onclick="selectRange(this)">14日</button>
      <button class="range-tab"        data-days="30" onclick="selectRange(this)">30日</button>
      <button class="range-tab"        data-days="90" onclick="selectRange(this)">90日</button>
    </div>

    <!-- KPI ユーザー -->
    <div class="section-title"><span class="icon">👥</span>ユーザー</div>
    <div class="kpi-grid" id="kpi-users"></div>

    <!-- KPI 求人・応募 -->
    <div class="section-title"><span class="icon">💼</span>求人 / 応募</div>
    <div class="kpi-grid" id="kpi-jobs"></div>

    <!-- KPI メッセージ・LINE -->
    <div class="section-title"><span class="icon">💬</span>メッセージ / LINE</div>
    <div class="kpi-grid" id="kpi-msg"></div>

    <!-- チャート -->
    <div class="section-title"><span class="icon">📈</span>トレンド</div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">ユーザー登録トレンド</div>
        <div class="sparkline-wrap" id="chart-user-trend"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">応募ステータス内訳</div>
        <div class="status-grid" id="chart-app-status"></div>
      </div>
    </div>

    <!-- 分布 -->
    <div class="section-title"><span class="icon">🗾</span>地域・カテゴリ分布</div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">医師の都道府県分布（上位10件）</div>
        <div class="bar-chart" id="chart-pref-doctor"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">求人診療科 TOP 10</div>
        <div class="bar-chart" id="chart-specialties"></div>
      </div>
    </div>

    <!-- テーブル -->
    <div class="section-title"><span class="icon">🕐</span>最近のアクティビティ</div>
    <div class="tables-grid">
      <div class="table-card">
        <div class="chart-title">新着ユーザー</div>
        <table id="table-users"></table>
      </div>
      <div class="table-card">
        <div class="chart-title">新着応募</div>
        <table id="table-apps"></table>
      </div>
    </div>

    <div class="section-title"><span class="icon">📱</span>LINE イベント（直近20件）</div>
    <div class="table-card">
      <table id="table-line" style="width:100%"></table>
    </div>

  </main>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loading" style="display:none">
  <div class="spinner"></div>
</div>

<script>
  let currentSecret = '';
  let currentDays = 7;

  // ── ログイン ───────────────────────────────────────────────────────────────
  function doLogin() {
    const secret = document.getElementById('admin-secret').value.trim();
    if (!secret) return;
    currentSecret = secret;
    loadStats();
  }

  document.getElementById('admin-secret').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    currentSecret = '';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-secret').value = '';
  }

  function selectRange(btn) {
    document.querySelectorAll('.range-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentDays = parseInt(btn.dataset.days);
    loadStats();
  }

  // ── データ取得 ─────────────────────────────────────────────────────────────
  async function loadStats() {
    setLoading(true);
    try {
      const res = await fetch(`/api/admin/stats?days=${currentDays}`, {
        headers: { 'x-admin-secret': currentSecret },
      });
      if (res.status === 401) {
        setLoading(false);
        document.getElementById('login-error').style.display = 'block';
        return;
      }
      document.getElementById('login-error').style.display = 'none';
      const data = await res.json();
      if (!data.ok) throw new Error(data.error);

      // 認証OK → ダッシュボード表示
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

      renderAll(data);
      document.getElementById('last-updated').textContent =
        '最終更新: ' + new Date(data.generated_at).toLocaleString('ja-JP');
    } catch (err) {
      alert('データ取得エラー: ' + err.message);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(flag) {
    document.getElementById('loading').style.display = flag ? 'flex' : 'none';
  }

  // ── レンダリング ───────────────────────────────────────────────────────────
  function renderAll(d) {
    renderKpiUsers(d.users);
    renderKpiJobs(d.jobs, d.applications);
    renderKpiMsg(d.messages, d.line_events);
    renderUserTrend(d.trends.user_registrations);
    renderAppStatus(d.applications);
    renderBarChart('chart-pref-doctor', d.distributions.doctors_by_prefecture, '#FF6B9D');
    renderBarChart('chart-specialties', d.distributions.top_job_specialties, '#A78BFA');
    renderTableUsers(d.recent.users);
    renderTableApps(d.recent.applications);
    renderTableLine(d.recent.line_events);
  }

  function kpiCard(label, value, sub, colorClass, weekBadge) {
    const badge = weekBadge != null
      ? `<span class="kpi-badge badge-week">+${weekBadge} 今週</span>`
      : '';
    return `
      <div class="kpi-card ${colorClass}">
        <div class="kpi-label">${label}</div>
        <div class="kpi-value">${value.toLocaleString()}${badge}</div>
        ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
      </div>`;
  }

  function renderKpiUsers(u) {
    document.getElementById('kpi-users').innerHTML = [
      kpiCard('総ユーザー数',      u.total,                '',                              'pink',   u.new_this_week),
      kpiCard('医師',              u.doctors,              `アクティブ: ${u.active}`,        'pink',   null),
      kpiCard('看護師',            u.nurses,               '',                              'green',  null),
      kpiCard('医療機関',          u.medical_institutions, '',                              'blue',   null),
      kpiCard('今月の新規登録',    u.new_this_month,       `今週: ${u.new_this_week}`,      'purple', null),
    ].join('');
  }

  function renderKpiJobs(j, a) {
    document.getElementById('kpi-jobs').innerHTML = [
      kpiCard('求人総数',          j.total,         `掲載中: ${j.active}`,           'teal',   j.new_this_week),
      kpiCard('応募総数',          a.total,         `今週: ${a.new_this_week}`,       'purple', a.new_this_week),
      kpiCard('承認済み応募',      a.accepted,      `マッチング率: ${a.acceptance_rate}%`, 'green', null),
      kpiCard('審査待ち',          a.pending,       '',                              'yellow', null),
      kpiCard('今月の応募',        a.new_this_month,'',                              'blue',   null),
    ].join('');
  }

  function renderKpiMsg(m, l) {
    document.getElementById('kpi-msg').innerHTML = [
      kpiCard('会話数',            m.total_conversations, '',                          'teal',   null),
      kpiCard('メッセージ総数',    m.total,               `未読: ${m.unread}`,          'blue',   m.new_this_week),
      kpiCard('LINEイベント総数',  l.total,               `フォロー: ${l.follows}`,     'green',  l.new_this_week),
      kpiCard('LINEメッセージ',   l.messages,            '',                          'purple', null),
    ].join('');
  }

  function renderUserTrend(rows) {
    if (!rows.length) {
      document.getElementById('chart-user-trend').innerHTML = '<div class="empty-state">データなし</div>';
      return;
    }
    const maxTotal = Math.max(...rows.map(r => r.total), 1);
    const doctorColor  = '#FF6B9D';
    const nurseColor   = '#34D399';
    const medicalColor = '#4CC9F0';

    const cols = rows.map(r => {
      const dH = Math.max(Math.round(r.doctors  / maxTotal * 70), r.doctors  > 0 ? 4 : 0);
      const nH = Math.max(Math.round(r.nurses   / maxTotal * 70), r.nurses   > 0 ? 4 : 0);
      const mH = Math.max(Math.round(r.medical  / maxTotal * 70), r.medical  > 0 ? 4 : 0);
      const dateStr = typeof r.date === 'string' ? r.date.slice(5) : new Date(r.date).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric'});
      return `
        <div class="sparkline-col" title="${r.date}: 医師${r.doctors} 看護師${r.nurses} 医療機関${r.medical}">
          <div class="sparkline-bar" style="height:${dH}px;background:${doctorColor};"></div>
          <div class="sparkline-bar" style="height:${nH}px;background:${nurseColor};"></div>
          <div class="sparkline-bar" style="height:${mH}px;background:${medicalColor};"></div>
          <span class="sparkline-date">${dateStr}</span>
        </div>`;
    }).join('');

    const legend = `
      <div style="display:flex;gap:1rem;font-size:0.72rem;margin-bottom:0.75rem">
        <span><span style="color:${doctorColor}">■</span> 医師</span>
        <span><span style="color:${nurseColor}">■</span> 看護師</span>
        <span><span style="color:${medicalColor}">■</span> 医療機関</span>
      </div>`;

    document.getElementById('chart-user-trend').innerHTML =
      legend + `<div class="sparkline-bars">${cols}</div>`;
  }

  function renderAppStatus(a) {
    const items = [
      { label: '審査待ち',   value: a.pending,   color: '#FBBF24' },
      { label: '審査中',     value: a.reviewing, color: '#60A5FA' },
      { label: '承認',       value: a.accepted,  color: '#34D399' },
      { label: '却下',       value: a.rejected,  color: '#F87171' },
      { label: '取下げ',     value: a.withdrawn, color: '#9CA3AF' },
    ];
    document.getElementById('chart-app-status').innerHTML = items.map(i => `
      <div class="status-item">
        <div class="status-dot" style="background:${i.color}"></div>
        <div>
          <div class="status-label">${i.label}</div>
          <div class="status-value">${i.value.toLocaleString()}</div>
        </div>
      </div>`).join('');
  }

  function renderBarChart(containerId, rows, color) {
    if (!rows.length) {
      document.getElementById(containerId).innerHTML = '<div class="empty-state">データなし</div>';
      return;
    }
    const max = Math.max(...rows.map(r => r.count), 1);
    document.getElementById(containerId).innerHTML = rows.map(r => {
      const pct = Math.round(r.count / max * 100);
      return `
        <div class="bar-row">
          <div class="bar-label" title="${r.name}">${r.name}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>
          <div class="bar-count">${r.count}</div>
        </div>`;
    }).join('');
  }

  function userTypeBadge(t) {
    const map = { doctor: ['badge-doctor','医師'], nurse: ['badge-nurse','看護師'], medical: ['badge-medical','医療機関'] };
    const [cls, label] = map[t] || ['',''];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function statusBadge(s) {
    const map = {
      pending:   ['badge-pending',  '審査待ち'],
      reviewing: ['badge-reviewing','審査中'],
      accepted:  ['badge-accepted', '承認'],
      rejected:  ['badge-rejected', '却下'],
      withdrawn: ['badge-withdrawn','取下げ'],
    };
    const [cls, label] = map[s] || ['',''];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  function fmtDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function renderTableUsers(rows) {
    if (!rows.length) {
      document.getElementById('table-users').innerHTML = '<tr><td class="empty-state" colspan="3">データなし</td></tr>';
      return;
    }
    document.getElementById('table-users').innerHTML = `
      <thead><tr><th>名前</th><th>種別</th><th>登録日</th></tr></thead>
      <tbody>${rows.map(r => `
        <tr>
          <td>${escHtml(r.name)}</td>
          <td>${userTypeBadge(r.user_type)}</td>
          <td>${fmtDate(r.created_at)}</td>
        </tr>`).join('')}
      </tbody>`;
  }

  function renderTableApps(rows) {
    if (!rows.length) {
      document.getElementById('table-apps').innerHTML = '<tr><td class="empty-state" colspan="4">データなし</td></tr>';
      return;
    }
    document.getElementById('table-apps').innerHTML = `
      <thead><tr><th>応募者</th><th>求人</th><th>ステータス</th><th>日時</th></tr></thead>
      <tbody>${rows.map(r => `
        <tr>
          <td>${escHtml(r.applicant_name)} ${userTypeBadge(r.applicant_type)}</td>
          <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(r.job_title)}">${escHtml(r.job_title)}</td>
          <td>${statusBadge(r.status)}</td>
          <td>${fmtDate(r.created_at)}</td>
        </tr>`).join('')}
      </tbody>`;
  }

  function renderTableLine(rows) {
    if (!rows.length) {
      document.getElementById('table-line').innerHTML = '<tr><td class="empty-state" colspan="4">データなし</td></tr>';
      return;
    }
    const lineTypeBadge = (t) => {
      const map = { follow: ['badge-follow','フォロー'], unfollow: ['badge-unfollow','フォロー解除'], message: ['badge-message','メッセージ'] };
      const [cls, label] = map[t] || ['', t];
      return `<span class="badge ${cls}">${label}</span>`;
    };
    document.getElementById('table-line').innerHTML = `
      <thead><tr><th>種別</th><th>ユーザーID</th><th>メッセージ</th><th>受信日時</th></tr></thead>
      <tbody>${rows.map(r => `
        <tr>
          <td>${lineTypeBadge(r.event_type)}</td>
          <td style="font-size:0.72rem;color:var(--gray-400)">${r.source_user_id ? escHtml(r.source_user_id.slice(0,16)) + '…' : '-'}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.message_text ? escHtml(r.message_text) : '-'}</td>
          <td>${fmtDate(r.received_at)}</td>
        </tr>`).join('')}
      </tbody>`;
  }

  function escHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
