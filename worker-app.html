<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MITAS Worker</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0D2340">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 本番環境では Netlify の build hook 等で実値に差し替えること
    window.__SUPABASE_URL__      = 'https://YOUR_PROJECT.supabase.co';
    window.__SUPABASE_ANON_KEY__ = 'YOUR_SUPABASE_ANON_KEY';
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy:       #1B3A6B;
      --navy-deep:  #0D2340;
      --teal:       #0EA5E9;
      --teal-light: #38BDF8;
      --teal-pale:  #F0F9FF;
      --green:      #10B981;
      --green-deep: #047857;
      --green-pale: #ECFDF5;
      --amber:      #F59E0B;
      --amber-pale: #FFFBEB;
      --red:        #DC2626;
      --red-deep:   #991B1B;
      --red-pale:   #FEF2F2;
      --gray-900:   #0F172A;
      --gray-700:   #334155;
      --gray-500:   #64748B;
      --gray-400:   #94A3B8;
      --gray-300:   #CBD5E1;
      --gray-200:   #E2E8F0;
      --gray-100:   #F1F5F9;
      --gray-50:    #F8FAFC;
      --white:      #FFFFFF;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.06);
      --shadow-md:  0 6px 20px rgba(15,23,42,0.08);
      --shadow-lg:  0 12px 32px rgba(15,23,42,0.12);
      --radius:     10px;
      --radius-lg:  16px;
      --bottom-nav-h: 64px;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #EEF2F7;
      color: var(--gray-700);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }

    /* ─── トップバー ─── */
    .topbar {
      background: var(--navy-deep);
      color: var(--white);
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      padding-top: env(safe-area-inset-top);
      height: calc(52px + env(safe-area-inset-top));
    }
    .topbar__brand {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--white);
    }
    .topbar__brand small {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.65);
      margin-left: 8px;
    }
    .topbar__user {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar__email {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topbar__btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--white);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .topbar__btn:active { background: rgba(255,255,255,0.2); }

    /* ─── メインスクロール領域 ─── */
    .main {
      padding: 20px 16px;
      padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom) + 24px);
      max-width: 520px;
      margin: 0 auto;
    }

    /* ─── ページ見出し ─── */
    .page-head {
      margin-bottom: 18px;
    }
    .page-head__eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .page-head__title {
      font-size: 20px;
      font-weight: 700;
      color: var(--navy-deep);
      letter-spacing: -0.01em;
    }
    .page-head__sub {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 2px;
    }

    /* ─── アサインカード ─── */
    .card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .card__head {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card__title {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy-deep);
      line-height: 1.4;
    }
    .card__subtitle {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 2px;
    }
    .card__body {
      padding: 16px 18px;
    }
    .card__meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 16px;
      margin-bottom: 16px;
    }
    .card__meta-item {
      min-width: 0;
    }
    .card__meta-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gray-400);
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .card__meta-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-900);
      line-height: 1.4;
      overflow-wrap: anywhere;
    }
    .card__meta-value--num {
      font-size: 16px;
      letter-spacing: -0.01em;
    }
    .card__meta-value--num .unit {
      font-size: 11px;
      font-weight: 500;
      color: var(--gray-500);
      margin-left: 2px;
    }

    /* ─── 状態バッジ ─── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .badge--confirmed { background: var(--teal-pale); color: var(--teal); }
    .badge--checked_in { background: var(--green-pale); color: var(--green-deep); }
    .badge--checked_out { background: var(--amber-pale); color: var(--amber); }
    .badge--completion_reported,
    .badge--completion_confirmed { background: var(--gray-100); color: var(--gray-700); }
    .badge--cancelled,
    .badge--disputed { background: var(--red-pale); color: var(--red); }

    /* ─── アクションボタン ─── */
    .action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.08s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      min-height: 60px;
      box-shadow: var(--shadow-md);
    }
    .action:active { transform: translateY(1px); box-shadow: var(--shadow-sm); }
    .action[disabled] { opacity: 0.5; cursor: not-allowed; }
    .action--check-in { background: var(--green); color: var(--white); }
    .action--check-in:active { background: var(--green-deep); }
    .action--check-out { background: var(--red); color: var(--white); }
    .action--check-out:active { background: var(--red-deep); }
    .action--completion { background: var(--navy); color: var(--white); }
    .action--completion:active { background: var(--navy-deep); }
    .action--secondary {
      background: var(--white);
      color: var(--gray-700);
      border: 1px solid var(--gray-200);
      box-shadow: none;
      min-height: 44px;
      font-size: 13px;
      padding: 10px 16px;
      margin-top: 10px;
    }

    .action__icon {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── GPS インジケーター ─── */
    .gps-info {
      margin-top: 12px;
      font-size: 11px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: center;
    }
    .gps-info__dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gray-300);
    }
    .gps-info--ok .gps-info__dot { background: var(--green); }
    .gps-info--warn .gps-info__dot { background: var(--amber); }
    .gps-info--err .gps-info__dot { background: var(--red); }

    /* ─── 空状態 ─── */
    .empty {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 40px 24px;
      text-align: center;
    }
    .empty__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    .empty__sub {
      font-size: 12px;
      color: var(--gray-500);
    }

    /* ─── スケルトン ─── */
    .skeleton {
      background: linear-gradient(90deg, var(--gray-100), var(--gray-200), var(--gray-100));
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite linear;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-card { padding: 18px; }
    .skeleton-line { height: 14px; margin-bottom: 10px; }
    .skeleton-line--lg { height: 20px; width: 70%; }
    .skeleton-line--md { width: 55%; }
    .skeleton-line--sm { width: 35%; }
    .skeleton-action { height: 60px; margin-top: 16px; border-radius: var(--radius); }

    /* ─── 通知トースト ─── */
    .toast {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(var(--bottom-nav-h) + 16px + env(safe-area-inset-bottom));
      background: var(--gray-900);
      color: var(--white);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 200;
      max-width: calc(100vw - 32px);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .toast--visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }
    .toast--error { background: var(--red-deep); }
    .toast--success { background: var(--green-deep); }

    /* ─── ボトムナビ ─── */
    .bottom-nav {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--white);
      border-top: 1px solid var(--gray-200);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      height: var(--bottom-nav-h);
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 90;
    }
    .bottom-nav__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      color: var(--gray-400);
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      padding: 8px 0 6px;
      position: relative;
    }
    .bottom-nav__item[aria-current="page"] {
      color: var(--navy-deep);
    }
    .bottom-nav__item[aria-current="page"]::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 3px;
      background: var(--teal);
      border-radius: 0 0 3px 3px;
    }
    .bottom-nav__item[disabled] {
      color: var(--gray-300);
      cursor: not-allowed;
    }
    .bottom-nav__icon {
      width: 22px;
      height: 22px;
    }

    /* ─── 開発バナー（モックモード時のみ）─── */
    .dev-banner {
      background: var(--amber-pale);
      color: var(--amber);
      border: 1px solid #FDE68A;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 14px;
    }

    /* ─── Schedule タブ ─── */
    .view { display: none; }
    .view--active { display: block; }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 22px 2px 10px;
    }
    .section-head:first-child { margin-top: 0; }
    .section-head__title {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy-deep);
      letter-spacing: 0.04em;
    }
    .section-head__count {
      font-size: 11px;
      color: var(--gray-500);
      font-weight: 500;
    }

    .list-card {
      background: var(--white);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.08s ease;
      text-align: left;
      width: 100%;
      font-family: inherit;
    }
    .list-card:active { transform: translateY(1px); }
    .list-card:hover { border-color: var(--gray-200); box-shadow: var(--shadow-md); }
    .list-card__date {
      flex: 0 0 56px;
      text-align: center;
      padding: 6px 0;
      border-right: 1px solid var(--gray-100);
    }
    .list-card__date-day {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy-deep);
      line-height: 1;
    }
    .list-card__date-month {
      font-size: 10px;
      font-weight: 600;
      color: var(--gray-500);
      letter-spacing: 0.04em;
      margin-top: 4px;
    }
    .list-card__date-week {
      font-size: 10px;
      color: var(--gray-400);
      margin-top: 2px;
    }
    .list-card__body {
      flex: 1;
      min-width: 0;
    }
    .list-card__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-900);
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .list-card__meta {
      font-size: 11px;
      color: var(--gray-500);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .list-card__meta-sep {
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--gray-300);
    }
    .list-card__chevron {
      flex: 0 0 auto;
      color: var(--gray-300);
    }
    .list-card--past { opacity: 0.78; }

    /* ─── プレースホルダー（Profile タブ等）─── */
    .placeholder-view {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 56px 24px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .placeholder-view__title {
      font-size: 15px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    .placeholder-view__sub {
      font-size: 12px;
      color: var(--gray-500);
    }

    /* ─── 大画面では幅制限 ─── */
    @media (min-width: 600px) {
      .main { padding: 28px 24px; }
    }
  </style>
</head>
<body>

<!-- ═════ トップバー ═════ -->
<header class="topbar">
  <div class="topbar__brand">MITAS<small>Worker</small></div>
  <div class="topbar__user">
    <span class="topbar__email" id="userEmail">読み込み中…</span>
    <button class="topbar__btn" id="logoutBtn" type="button">ログアウト</button>
  </div>
</header>

<!-- ═════ メイン ═════ -->
<main class="main">

  <div id="devBanner" class="dev-banner" hidden>モックモードで動作中（Supabase未接続）</div>

  <!-- ─── Today ビュー ─── -->
  <section id="view-today" class="view view--active" aria-labelledby="head-today">
    <div class="page-head">
      <div class="page-head__eyebrow">Today</div>
      <h1 class="page-head__title" id="head-today">本日のアサイン</h1>
      <p class="page-head__sub" id="todayDate"></p>
    </div>

    <!-- スケルトン -->
    <div id="skeleton" class="card skeleton-card">
      <div class="skeleton skeleton-line skeleton-line--lg"></div>
      <div class="skeleton skeleton-line skeleton-line--md"></div>
      <div class="skeleton skeleton-line skeleton-line--sm"></div>
      <div class="skeleton skeleton-action"></div>
    </div>

    <!-- アサインカード（動的描画） -->
    <div id="assignmentRoot" hidden></div>

    <!-- 空状態 -->
    <div id="emptyState" class="empty" hidden>
      <div class="empty__title">現在のアサインはありません</div>
      <div class="empty__sub">新しい依頼が確定するとここに表示されます。</div>
    </div>
  </section>

  <!-- ─── Schedule ビュー ─── -->
  <section id="view-schedule" class="view" aria-labelledby="head-schedule">
    <div class="page-head">
      <div class="page-head__eyebrow">Schedule</div>
      <h1 class="page-head__title" id="head-schedule">アサイン一覧</h1>
      <p class="page-head__sub">今後の予定と過去の勤務履歴</p>
    </div>

    <!-- スケルトン -->
    <div id="scheduleSkeleton">
      <div class="skeleton skeleton-line" style="height:32px; width:40%; margin-bottom:12px;"></div>
      <div class="skeleton" style="height:64px; border-radius:12px; margin-bottom:8px;"></div>
      <div class="skeleton" style="height:64px; border-radius:12px; margin-bottom:8px;"></div>
      <div class="skeleton" style="height:64px; border-radius:12px; margin-bottom:8px;"></div>
    </div>

    <div id="scheduleRoot" hidden></div>

    <div id="scheduleEmpty" class="empty" hidden>
      <div class="empty__title">表示できるアサインがありません</div>
      <div class="empty__sub">確定したアサインや過去の勤務がここに一覧表示されます。</div>
    </div>
  </section>

  <!-- ─── Profile ビュー（v0.3 で実装予定） ─── -->
  <section id="view-profile" class="view" aria-labelledby="head-profile">
    <div class="page-head">
      <div class="page-head__eyebrow">Profile</div>
      <h1 class="page-head__title" id="head-profile">プロフィール</h1>
    </div>
    <div class="placeholder-view">
      <div class="placeholder-view__title">準備中</div>
      <div class="placeholder-view__sub">資格情報・空き枠の編集機能は次回アップデートで追加します。</div>
    </div>
  </section>

</main>

<!-- ═════ トースト ═════ -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- ═════ ボトムナビ ═════ -->
<nav class="bottom-nav" aria-label="メインナビゲーション">
  <button class="bottom-nav__item" type="button" data-tab="today" aria-current="page">
    <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V10"/>
    </svg>
    Today
  </button>
  <button class="bottom-nav__item" type="button" data-tab="schedule">
    <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
    </svg>
    Schedule
  </button>
  <button class="bottom-nav__item" type="button" data-tab="profile" disabled title="準備中">
    <svg class="bottom-nav__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>
    </svg>
    Profile
  </button>
</nav>

<script>
  // ─── Supabase 初期化 ───
  const SUPABASE_URL = window.__SUPABASE_URL__;
  const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__;
  const isMockMode = !SUPABASE_URL || SUPABASE_URL.includes('YOUR_PROJECT');
  const supabase = !isMockMode && window.supabase
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  // 現在のセッション情報（init で設定）
  let currentToken = null;
  let currentUser = null;

  // 直近に取得した GPS 座標（check-in / check-out 時に同梱）
  let lastGpsCoords = null;

  // 表示中のアサイン（PATCH 後の楽観更新に使用）
  let currentAssignment = null;

  // 直近に取得した全アサイン（Schedule タブ用）
  let allAssignments = [];

  // 現在のタブ
  let currentTab = 'today';

  // ─── 起動 ───
  document.addEventListener('DOMContentLoaded', init);

  async function init() {
    // 本日の日付表示
    document.getElementById('todayDate').textContent = formatTodayDate();

    // モックバナー
    if (isMockMode) document.getElementById('devBanner').hidden = false;

    // セッション確認
    if (supabase) {
      const { data, error } = await supabase.auth.getSession();
      if (error || !data.session) {
        location.replace('/login.html');
        return;
      }
      currentToken = data.session.access_token;
      currentUser = data.session.user;
      document.getElementById('userEmail').textContent = currentUser.email || '';
    } else {
      // モック表示
      document.getElementById('userEmail').textContent = 'mock@example.com';
    }

    // ログアウト
    document.getElementById('logoutBtn').addEventListener('click', handleLogout);

    // タブ切替
    document.querySelectorAll('.bottom-nav__item[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        switchTab(btn.dataset.tab);
      });
    });

    // GPS 取得（許可された場合のみ。失敗してもボタンは動作）
    requestGps();

    // アサイン一覧を取得（Today / Schedule 両方で利用）
    await loadAssignments();
  }

  // ─── タブ切替 ───
  function switchTab(tab) {
    if (currentTab === tab) return;
    currentTab = tab;
    // ビュー切替
    document.querySelectorAll('.view').forEach(v => v.classList.remove('view--active'));
    document.getElementById('view-' + tab).classList.add('view--active');
    // ナビ強調
    document.querySelectorAll('.bottom-nav__item[data-tab]').forEach(b => {
      if (b.dataset.tab === tab) b.setAttribute('aria-current', 'page');
      else b.removeAttribute('aria-current');
    });
    // 上部にスクロール
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── ログアウト ───
  async function handleLogout() {
    if (supabase) await supabase.auth.signOut();
    location.replace('/login.html');
  }

  // ─── GPS（任意・非同期）───
  function requestGps() {
    if (!('geolocation' in navigator)) return;
    navigator.geolocation.getCurrentPosition(
      pos => {
        lastGpsCoords = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          accuracy: pos.coords.accuracy,
        };
        updateGpsIndicator();
      },
      err => {
        // 拒否や失敗は無視（ボタンは動作する）
        lastGpsCoords = { error: err.code };
        updateGpsIndicator();
      },
      { enableHighAccuracy: true, timeout: 6000, maximumAge: 30000 }
    );
  }

  function updateGpsIndicator() {
    const el = document.getElementById('gpsInfo');
    if (!el) return;
    if (lastGpsCoords && lastGpsCoords.lat) {
      el.className = 'gps-info gps-info--ok';
      el.innerHTML = `<span class="gps-info__dot"></span>位置情報取得済み（精度 ±${Math.round(lastGpsCoords.accuracy)}m）`;
    } else if (lastGpsCoords && lastGpsCoords.error) {
      el.className = 'gps-info gps-info--warn';
      el.innerHTML = `<span class="gps-info__dot"></span>位置情報なし（送信時に座標は記録されません）`;
    } else {
      el.className = 'gps-info';
      el.innerHTML = `<span class="gps-info__dot"></span>位置情報を取得中…`;
    }
  }

  // ─── アサイン一覧取得（Today / Schedule 両用）───
  async function loadAssignments() {
    showSkeleton(true);
    showScheduleSkeleton(true);
    try {
      // バックエンドの list は単一 status のみ対応のため、フィルタなしで取得しフロントで判定
      const data = await apiFetch('/api/v2/assignments?limit=100');
      allAssignments = data.assignments || [];

      // Today: アクティブな状態のものから優先順位で1件選ぶ
      const active = allAssignments.filter(a =>
        ['confirmed', 'checked_in', 'checked_out'].includes(a.status)
      );
      active.sort((a, b) => priorityOf(a) - priorityOf(b));
      currentAssignment = active[0] || null;
      renderAssignment(currentAssignment);

      // Schedule: 全件をセクション分け
      renderSchedule(allAssignments);
    } catch (e) {
      console.error(e);
      showToast('アサインの取得に失敗しました', 'error');
      renderAssignment(null);
      renderSchedule([]);
    } finally {
      showSkeleton(false);
      showScheduleSkeleton(false);
    }
  }

  function priorityOf(a) {
    // checked_in を最優先、次に開始時刻が近い confirmed、最後に checked_out
    const order = { checked_in: 0, confirmed: 1, checked_out: 2 };
    const base = (order[a.status] ?? 3) * 1e13;
    const t = new Date(a.scheduled_start_at || 0).getTime();
    return base + t;
  }

  // ─── 描画 ───
  function renderAssignment(a) {
    const root = document.getElementById('assignmentRoot');
    const empty = document.getElementById('emptyState');
    if (!a) {
      root.hidden = true;
      empty.hidden = false;
      return;
    }
    empty.hidden = true;
    root.hidden = false;

    const title = a.staffing_requests?.title || a.assignment_number || 'アサイン';
    const subtitle = [
      a.staffing_requests?.request_number,
      a.worker_profiles?.profession_type ? professionLabel(a.worker_profiles.profession_type) : null
    ].filter(Boolean).join(' / ');

    const start = a.scheduled_start_at ? new Date(a.scheduled_start_at) : null;
    const end = a.scheduled_end_at ? new Date(a.scheduled_end_at) : null;
    const dateLabel = start ? `${formatDateShort(start)} ${formatTime(start)}${end ? '〜' + formatTime(end) : ''}` : '-';
    const hourly = a.hourly_rate != null ? `¥${fmt(a.hourly_rate)}` : '-';
    const total = a.total_compensation != null ? `¥${fmt(a.total_compensation)}` : '-';

    root.innerHTML = `
      <article class="card" aria-label="次のアサイン">
        <header class="card__head">
          <div>
            <div class="card__title">${escapeHtml(title)}</div>
            ${subtitle ? `<div class="card__subtitle">${escapeHtml(subtitle)}</div>` : ''}
          </div>
          <span class="badge badge--${a.status}">${statusLabel(a.status)}</span>
        </header>
        <div class="card__body">
          <div class="card__meta">
            <div class="card__meta-item">
              <div class="card__meta-label">勤務日時</div>
              <div class="card__meta-value">${escapeHtml(dateLabel)}</div>
            </div>
            <div class="card__meta-item">
              <div class="card__meta-label">時給</div>
              <div class="card__meta-value card__meta-value--num">${hourly}<span class="unit">/時</span></div>
            </div>
            <div class="card__meta-item">
              <div class="card__meta-label">支払予定</div>
              <div class="card__meta-value card__meta-value--num">${total}</div>
            </div>
            <div class="card__meta-item">
              <div class="card__meta-label">アサイン番号</div>
              <div class="card__meta-value">${escapeHtml(a.assignment_number || '-')}</div>
            </div>
          </div>
          ${renderActionButton(a)}
          <div id="gpsInfo" class="gps-info"><span class="gps-info__dot"></span>位置情報を取得中…</div>
        </div>
      </article>
    `;

    // GPS インジケーターを反映
    updateGpsIndicator();

    // ボタンイベント
    const btn = document.getElementById('primaryAction');
    if (btn) btn.addEventListener('click', onPrimaryAction);
  }

  function renderActionButton(a) {
    if (a.status === 'confirmed') {
      return `<button id="primaryAction" class="action action--check-in" type="button" data-next="checked_in">
        <span class="action__icon">${iconCheck()}</span>勤務開始（チェックイン）
      </button>`;
    }
    if (a.status === 'checked_in') {
      return `<button id="primaryAction" class="action action--check-out" type="button" data-next="checked_out">
        <span class="action__icon">${iconStop()}</span>勤務終了（チェックアウト）
      </button>`;
    }
    if (a.status === 'checked_out') {
      return `<button id="primaryAction" class="action action--completion" type="button" data-next="completion_reported">
        <span class="action__icon">${iconFlag()}</span>勤務完了を報告する
      </button>`;
    }
    return `<button class="action" type="button" disabled>このアサインは操作できません</button>`;
  }

  // ─── アクション実行 ───
  async function onPrimaryAction(ev) {
    const btn = ev.currentTarget;
    const next = btn.dataset.next;
    if (!currentAssignment || !next) return;

    btn.disabled = true;
    btn.textContent = '送信中…';

    const body = { status: next };
    if (next === 'checked_in' && lastGpsCoords?.lat) {
      body.check_in_lat = lastGpsCoords.lat;
      body.check_in_lng = lastGpsCoords.lng;
    }
    if (next === 'checked_out' && lastGpsCoords?.lat) {
      body.check_out_lat = lastGpsCoords.lat;
      body.check_out_lng = lastGpsCoords.lng;
    }

    try {
      const data = await apiFetch(`/api/v2/assignments/${currentAssignment.id}`, {
        method: 'PATCH',
        body: JSON.stringify(body),
      });
      // 楽観更新
      currentAssignment = { ...currentAssignment, ...(data.assignment || {}) };
      renderAssignment(currentAssignment);
      showToast(successMessage(next), 'success');
    } catch (e) {
      console.error(e);
      showToast(e.message || '更新に失敗しました', 'error');
      // ボタン状態を元に戻すため再描画
      renderAssignment(currentAssignment);
    }
  }

  function successMessage(status) {
    if (status === 'checked_in') return 'チェックインしました';
    if (status === 'checked_out') return 'チェックアウトしました';
    if (status === 'completion_reported') return '完了報告を送信しました';
    return '更新しました';
  }

  // ─── Schedule タブ描画 ───
  function renderSchedule(list) {
    const root = document.getElementById('scheduleRoot');
    const empty = document.getElementById('scheduleEmpty');
    if (!list || !list.length) {
      root.hidden = true;
      empty.hidden = false;
      return;
    }
    empty.hidden = true;
    root.hidden = false;

    const upcomingStatuses = ['confirmed', 'checked_in', 'checked_out'];
    const pastStatuses = ['completion_reported', 'completion_confirmed', 'cancelled', 'disputed'];

    const upcoming = list.filter(a => upcomingStatuses.includes(a.status))
      .sort((a, b) => new Date(a.scheduled_start_at || 0) - new Date(b.scheduled_start_at || 0));
    const past = list.filter(a => pastStatuses.includes(a.status))
      .sort((a, b) => new Date(b.scheduled_start_at || 0) - new Date(a.scheduled_start_at || 0));

    // 過去は最大 20 件まで（モバイルのスクロール疲れを抑える）
    const pastLimited = past.slice(0, 20);

    const sections = [];
    sections.push(renderScheduleSection('今後のアサイン', upcoming, false));
    sections.push(renderScheduleSection('過去のアサイン', pastLimited, true));
    root.innerHTML = sections.join('');

    // タップで Today タブへ遷移してそのアサインを表示
    root.querySelectorAll('.list-card[data-id]').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        const a = allAssignments.find(x => x.id === id);
        if (!a) return;
        // 操作可能な状態（confirmed/checked_in/checked_out）なら Today で詳細表示
        currentAssignment = a;
        renderAssignment(a);
        switchTab('today');
      });
    });
  }

  function renderScheduleSection(title, items, isPast) {
    const head = `<div class="section-head">
      <div class="section-head__title">${escapeHtml(title)}</div>
      <div class="section-head__count">${items.length} 件</div>
    </div>`;
    if (!items.length) {
      return head + `<div class="empty" style="padding:20px 16px;">
        <div class="empty__sub">該当なし</div>
      </div>`;
    }
    const cards = items.map(a => renderListCard(a, isPast)).join('');
    return head + cards;
  }

  function renderListCard(a, isPast) {
    const start = a.scheduled_start_at ? new Date(a.scheduled_start_at) : null;
    const day = start ? start.getDate() : '-';
    const month = start ? `${start.getMonth() + 1}月` : '';
    const week = start ? ['日','月','火','水','木','金','土'][start.getDay()] : '';
    const time = start ? formatTime(start) : '';
    const title = a.staffing_requests?.title || a.assignment_number || 'アサイン';
    const profession = a.worker_profiles?.profession_type ? professionLabel(a.worker_profiles.profession_type) : '';

    return `
      <button class="list-card${isPast ? ' list-card--past' : ''}" type="button" data-id="${escapeHtml(a.id)}" aria-label="${escapeHtml(title)}">
        <div class="list-card__date">
          <div class="list-card__date-month">${escapeHtml(month)}</div>
          <div class="list-card__date-day">${day}</div>
          <div class="list-card__date-week">${escapeHtml(week)}</div>
        </div>
        <div class="list-card__body">
          <div class="list-card__title">${escapeHtml(title)}</div>
          <div class="list-card__meta">
            <span class="badge badge--${a.status}">${statusLabel(a.status)}</span>
            ${time ? `<span class="list-card__meta-sep"></span><span>${escapeHtml(time)}</span>` : ''}
            ${profession ? `<span class="list-card__meta-sep"></span><span>${escapeHtml(profession)}</span>` : ''}
          </div>
        </div>
        <div class="list-card__chevron">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </button>`;
  }

  // ─── API 呼び出し（モックモードでは固定値を返す）───
  async function apiFetch(path, init = {}) {
    if (isMockMode) return mockResponse(path, init);
    const headers = {
      'Content-Type': 'application/json',
      ...(init.headers || {}),
    };
    if (currentToken) headers.Authorization = `Bearer ${currentToken}`;
    const res = await fetch(path, { ...init, headers });
    const text = await res.text();
    let json = null;
    try { json = text ? JSON.parse(text) : null; } catch { /* noop */ }
    if (!res.ok) {
      const msg = json?.error || `HTTP ${res.status}`;
      const err = new Error(msg);
      err.status = res.status;
      throw err;
    }
    return json || {};
  }

  // ─── モック応答（Supabase未接続時のローカル動作確認用）───
  const HOUR = 3600000;
  const DAY = 24 * HOUR;
  const mockState = {
    assignments: [
      // アクティブ（直近開始の confirmed）
      {
        id: '00000000-0000-0000-0000-000000000201',
        assignment_number: 'AS-2026-0001',
        status: 'confirmed',
        scheduled_start_at: new Date(Date.now() + 2 * HOUR).toISOString(),
        scheduled_end_at: new Date(Date.now() + 10 * HOUR).toISOString(),
        hourly_rate: 3800,
        total_compensation: 30400,
        staffing_requests: { request_number: 'SR-2026-0042', title: '武蔵野総合病院 / 病棟看護師（夜勤）' },
        worker_profiles: { profession_type: 'rn' },
      },
      // 今後（数日先）
      {
        id: '00000000-0000-0000-0000-000000000202',
        assignment_number: 'AS-2026-0002',
        status: 'confirmed',
        scheduled_start_at: new Date(Date.now() + 3 * DAY).toISOString(),
        scheduled_end_at: new Date(Date.now() + 3 * DAY + 8 * HOUR).toISOString(),
        hourly_rate: 4200,
        total_compensation: 33600,
        staffing_requests: { request_number: 'SR-2026-0058', title: '聖徳記念病院 / 外来看護師（日勤）' },
        worker_profiles: { profession_type: 'rn' },
      },
      {
        id: '00000000-0000-0000-0000-000000000203',
        assignment_number: 'AS-2026-0003',
        status: 'confirmed',
        scheduled_start_at: new Date(Date.now() + 7 * DAY).toISOString(),
        scheduled_end_at: new Date(Date.now() + 7 * DAY + 12 * HOUR).toISOString(),
        hourly_rate: 4500,
        total_compensation: 54000,
        staffing_requests: { request_number: 'SR-2026-0061', title: '東京湾岸クリニック / 看護師（夜勤）' },
        worker_profiles: { profession_type: 'rn' },
      },
      // 過去（完了済み）
      {
        id: '00000000-0000-0000-0000-000000000211',
        assignment_number: 'AS-2026-0011',
        status: 'completion_confirmed',
        scheduled_start_at: new Date(Date.now() - 2 * DAY).toISOString(),
        scheduled_end_at: new Date(Date.now() - 2 * DAY + 8 * HOUR).toISOString(),
        hourly_rate: 3800,
        total_compensation: 30400,
        staffing_requests: { request_number: 'SR-2026-0030', title: '城北中央病院 / 病棟看護師（夜勤）' },
        worker_profiles: { profession_type: 'rn' },
      },
      {
        id: '00000000-0000-0000-0000-000000000212',
        assignment_number: 'AS-2026-0012',
        status: 'completion_reported',
        scheduled_start_at: new Date(Date.now() - 5 * DAY).toISOString(),
        scheduled_end_at: new Date(Date.now() - 5 * DAY + 8 * HOUR).toISOString(),
        hourly_rate: 4000,
        total_compensation: 32000,
        staffing_requests: { request_number: 'SR-2026-0024', title: '海浜記念病院 / ICU看護師（日勤）' },
        worker_profiles: { profession_type: 'rn' },
      },
      {
        id: '00000000-0000-0000-0000-000000000213',
        assignment_number: 'AS-2026-0013',
        status: 'cancelled',
        scheduled_start_at: new Date(Date.now() - 9 * DAY).toISOString(),
        scheduled_end_at: new Date(Date.now() - 9 * DAY + 8 * HOUR).toISOString(),
        hourly_rate: 3800,
        total_compensation: 0,
        staffing_requests: { request_number: 'SR-2026-0019', title: '南町中央病院 / 病棟看護師' },
        worker_profiles: { profession_type: 'rn' },
      },
    ],
  };

  async function mockResponse(path, init = {}) {
    await new Promise(r => setTimeout(r, 350));
    if (init.method === 'PATCH' && path.startsWith('/api/v2/assignments/')) {
      const body = init.body ? JSON.parse(init.body) : {};
      const id = path.split('/').pop();
      const next = body.status;
      const valid = {
        confirmed: ['checked_in', 'cancelled'],
        checked_in: ['checked_out'],
        checked_out: ['completion_reported'],
      };
      const target = mockState.assignments.find(a => a.id === id);
      if (!target) { const e = new Error('Not found'); e.status = 404; throw e; }
      if (!(valid[target.status] || []).includes(next)) {
        const e = new Error('不正な状態遷移です');
        e.status = 409;
        throw e;
      }
      target.status = next;
      return { assignment: target };
    }
    if (path.startsWith('/api/v2/assignments')) {
      return { assignments: mockState.assignments };
    }
    return {};
  }

  // ─── UI ヘルパー ───
  function showSkeleton(on) {
    document.getElementById('skeleton').hidden = !on;
    if (on) {
      document.getElementById('assignmentRoot').hidden = true;
      document.getElementById('emptyState').hidden = true;
    }
  }

  function showScheduleSkeleton(on) {
    document.getElementById('scheduleSkeleton').hidden = !on;
    if (on) {
      document.getElementById('scheduleRoot').hidden = true;
      document.getElementById('scheduleEmpty').hidden = true;
    }
  }

  let toastTimer = null;
  function showToast(msg, kind) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast toast--visible' + (kind ? ' toast--' + kind : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      el.className = 'toast' + (kind ? ' toast--' + kind : '');
    }, 2400);
  }

  // ─── 文字列・整形ヘルパー ───
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }
  function fmt(n) {
    if (n == null || isNaN(n)) return '-';
    return Number(n).toLocaleString('ja-JP');
  }
  function formatTodayDate() {
    const d = new Date();
    const w = ['日','月','火','水','木','金','土'][d.getDay()];
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
  }
  function formatDateShort(d) {
    return `${d.getMonth()+1}/${d.getDate()}（${['日','月','火','水','木','金','土'][d.getDay()]}）`;
  }
  function formatTime(d) {
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  function statusLabel(s) {
    return ({
      confirmed: '確定',
      checked_in: '勤務中',
      checked_out: '勤務終了',
      completion_reported: '完了報告済',
      completion_confirmed: '確認済',
      cancelled: 'キャンセル',
      disputed: '係争中',
    })[s] || s;
  }
  function professionLabel(p) {
    return ({
      md: '医師', rn: '看護師', lpn: '准看護師', mt: '臨床検査技師',
      rt: '診療放射線技師', pt: '理学療法士', ot: '作業療法士',
      st: '言語聴覚士', ph: '薬剤師', ce: '臨床工学技士',
      ca: '看護助手', other: 'その他',
    })[p] || p || '-';
  }

  // ─── アイコン（インラインSVG）───
  function iconCheck() {
    return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  }
  function iconStop() {
    return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>`;
  }
  function iconFlag() {
    return `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V4h12l-2 4 2 4H4"/></svg>`;
  }
</script>
