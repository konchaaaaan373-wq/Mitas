<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません | Mitas for Alliance</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy:       #1B3A6B;
      --navy-deep:  #0D2340;
      --teal:       #0EA5E9;
      --teal-light: #38BDF8;
      --white:      #FFFFFF;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(160deg, var(--navy-deep) 0%, var(--navy) 100%);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(125,211,252,0.16), transparent 40%),
        radial-gradient(circle at 80% 20%, rgba(14,165,233,0.10), transparent 30%);
      pointer-events: none;
    }
    .wrap { position: relative; z-index: 1; max-width: 560px; }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--white);
      margin-bottom: 56px;
      text-decoration: none;
    }
    .logo svg { width: 22px; height: 22px; }
    .code {
      font-size: clamp(72px, 14vw, 132px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: rgba(255,255,255,0.18);
      margin-bottom: 18px;
      font-family: 'Noto Sans JP', sans-serif;
    }
    h1 {
      font-size: clamp(20px, 3.5vw, 26px);
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 18px;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 14.5px;
      color: rgba(255,255,255,0.65);
      line-height: 2;
      margin-bottom: 36px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14.5px;
      font-weight: 600;
      padding: 13px 26px;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s, transform 0.18s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn--primary {
      background: var(--teal);
      color: var(--white);
      box-shadow: 0 4px 16px rgba(14,165,233,0.35);
    }
    .btn--primary:hover {
      background: var(--teal-light);
      box-shadow: 0 6px 24px rgba(14,165,233,0.45);
    }
    .btn--ghost {
      background: rgba(255,255,255,0.06);
      color: var(--white);
      border: 1.5px solid rgba(255,255,255,0.32);
    }
    .btn--ghost:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.6);
    }
    .links {
      margin-top: 40px;
      padding-top: 28px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 18px 28px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 13px;
    }
    .links a {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.2s;
    }
    .links a:hover { color: var(--white); }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/service.html" class="logo">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 3C12 3 5 11.5 5 16C5 19.866 8.134 23 12 23C15.866 23 19 19.866 19 16C19 11.5 12 3 12 3Z"
              stroke="rgba(56,189,248,0.75)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
              fill="rgba(14,165,233,0.1)"/>
      </svg>
      Mitas for Alliance
    </a>

    <div class="code">404</div>
    <h1>お探しのページは<br>見つかりませんでした</h1>
    <p>
      URLが変更されたか、削除された可能性があります。<br>
      お手数ですが、下のリンクから目的のページへお進みください。
    </p>

    <div class="actions">
      <a href="/service.html" class="btn btn--primary">サービストップへ</a>
      <a href="/contact.html" class="btn btn--ghost">お問い合わせ</a>
    </div>

    <nav class="links" aria-label="主要ページ">
      <a href="/hospitals.html">医療機関の方へ</a>
      <a href="/professionals.html">医療者の方へ</a>
      <a href="/login.html">ログイン</a>
    </nav>
  </div>
</body>
</html>
