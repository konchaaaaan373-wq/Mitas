<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードをお忘れの方 | Mitas for Alliance</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.__SUPABASE_URL__      = 'https://cztoepghaimofqjnuvou.supabase.co';
    window.__SUPABASE_ANON_KEY__ = 'sb_publishable_Fc1Dp1Daj-GeHRlSmCR4ow_rFahzKql';
  </script>
  <script src="/hospital-login.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy:      #1B3A6B;
      --navy-deep: #0D2340;
      --teal:      #0EA5E9;
      --gray-900:  #0F172A;
      --gray-700:  #334155;
      --gray-500:  #64748B;
      --gray-300:  #CBD5E1;
      --gray-200:  #E2E8F0;
      --gray-100:  #F1F5F9;
      --gray-50:   #F8FAFC;
      --white:     #FFFFFF;
      --red:       #DC2626;
      --green:     #10B981;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #EEF2F7;
      color: var(--gray-700);
      display: flex; flex-direction: column;
      font-size: 14px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .site-header {
      background: var(--navy-deep);
      height: 48px;
      display: flex; align-items: center;
      padding: 0 24px;
      justify-content: space-between;
    }
    .site-header__logo { font-size: 18px; font-weight: 700; letter-spacing: 0.1em; color: var(--white); }
    .site-header__sub  { font-size: 12px; color: rgba(255,255,255,0.5); }
    .main {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 40px 16px;
    }
    .card-wrap { width: 100%; max-width: 440px; }
    .card-heading { text-align: center; margin-bottom: 24px; }
    .card-heading__title { font-size: 19px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .card-heading__sub   { font-size: 13px; color: var(--gray-500); line-height: 1.7; }
    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-top: 3px solid var(--navy);
      padding: 32px 36px 28px;
    }
    .alert {
      display: none; padding: 10px 14px;
      margin-bottom: 18px; font-size: 13px;
      border-left: 4px solid;
    }
    .alert.show  { display: block; }
    .alert--error   { background: #FEF2F2; border-color: var(--red);   color: var(--red); }
    .alert--success { background: #F0FDF4; border-color: var(--green); color: #065F46; }
    .form-group   { margin-bottom: 20px; }
    .form-label   { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
    .form-input   {
      width: 100%; height: 42px; padding: 0 12px;
      border: 1px solid var(--gray-300); border-radius: 3px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
    }
    .form-input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }
    .form-input::placeholder { color: var(--gray-300); }
    .btn {
      width: 100%; height: 44px;
      background: var(--navy); color: var(--white); border: none; border-radius: 3px;
      font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 600;
      letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s;
      position: relative;
    }
    .btn:hover:not(:disabled) { background: var(--navy-deep); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn .spin {
      display: none; position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .btn.loading .spin { display: block; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
    .card__footer {
      margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--gray-100);
      text-align: center; font-size: 12px; color: var(--gray-500);
    }
    .card__footer a { color: var(--teal); text-decoration: none; }
    .card__footer a:hover { text-decoration: underline; }
    /* 送信完了画面 */
    .sent-state { display: none; text-align: center; padding: 8px 0; }
    .sent-state.show { display: block; }
    .sent-state__icon {
      width: 52px; height: 52px; margin: 0 auto 16px;
      background: #F0FDF4; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: var(--green);
    }
    .sent-state__title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
    .sent-state__body  { font-size: 13px; color: var(--gray-500); line-height: 1.8; }
    .site-footer {
      background: var(--navy-deep); color: rgba(255,255,255,0.4);
      font-size: 11px; text-align: center; padding: 14px;
    }
    .site-footer a { color: rgba(255,255,255,0.4); text-decoration: none; }
    .site-footer a:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <header class="site-header">
    <span class="site-header__logo">Mitas for Alliance</span>
    <span class="site-header__sub">連携法人・医療機関 管理者ポータル</span>
  </header>

  <main class="main">
    <div class="card-wrap">
      <div class="card-heading">
        <p class="card-heading__title">パスワードの再設定</p>
        <p class="card-heading__sub">登録済みのメールアドレスを入力してください。<br>パスワード再設定用のリンクをお送りします。</p>
      </div>

      <div class="card" id="formCard">
        <div class="alert alert--error" id="errorAlert"></div>

        <!-- 送信フォーム -->
        <div id="formWrap">
          <div class="form-group">
            <label class="form-label" for="email">メールアドレス</label>
            <input class="form-input" type="email" id="email" autocomplete="email"
              placeholder="例: admin@hospital.jp" required>
          </div>
          <button class="btn" id="submitBtn">
            再設定メールを送信
            <span class="spin"></span>
          </button>
        </div>

        <!-- 送信完了 -->
        <div class="sent-state" id="sentState">
          <div class="sent-state__icon">&#10003;</div>
          <p class="sent-state__title">メールを送信しました</p>
          <p class="sent-state__body">
            入力されたアドレスに再設定リンクをお送りしました。<br>
            メールが届かない場合は迷惑メールフォルダもご確認ください。<br><br>
            リンクの有効期限は <strong>1時間</strong> です。
          </p>
        </div>

        <div class="card__footer">
          <a href="/login.html">ログイン画面に戻る</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    &copy; 2025 Neco Inc. &nbsp;|&nbsp;
    <a href="/privacy-policy.html">プライバシーポリシー</a>
    &nbsp;|&nbsp;
    <a href="/terms.html">利用規約</a>
  </footer>

  <script>
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');

    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendReset();
    });
    submitBtn.addEventListener('click', sendReset);

    async function sendReset() {
      const email = document.getElementById('email').value.trim();
      errorAlert.classList.remove('show');

      if (!email) {
        showError('メールアドレスを入力してください。');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('有効なメールアドレスを入力してください。');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.classList.add('loading');

      try {
        // hospital-login.js のロードを待つ
        await waitForScript();
        await resetPassword(email);
        // 成功：送信完了画面に切り替え
        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('sentState').classList.add('show');
      } catch (err) {
        showError(err.message || 'エラーが発生しました。しばらく後にお試しください。');
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    }

    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.add('show');
    }

    function waitForScript() {
      return new Promise(resolve => {
        if (typeof resetPassword === 'function') { resolve(); return; }
        const s = document.querySelector('script[src="/hospital-login.js"]');
        s ? s.addEventListener('load', resolve) : setTimeout(resolve, 500);
      });
    }
  </script>
</body>
</html>
