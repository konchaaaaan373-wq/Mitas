<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neco Console | MITAS</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // 本番環境では Netlify の build hook 等で実値に差し替えること
    window.__SUPABASE_URL__      = 'https://YOUR_PROJECT.supabase.co';
    window.__SUPABASE_ANON_KEY__ = 'YOUR_SUPABASE_ANON_KEY';
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy:       #1B3A6B;
      --navy-deep:  #0D2340;
      --navy-mid:   #243B5E;
      --teal:       #0EA5E9;
      --teal-light: #38BDF8;
      --teal-pale:  #F0F9FF;
      --green:      #10B981;
      --green-pale: #ECFDF5;
      --amber:      #F59E0B;
      --amber-pale: #FFFBEB;
      --red:        #DC2626;
      --red-pale:   #FEF2F2;
      --gray-900:   #0F172A;
      --gray-700:   #334155;
      --gray-500:   #64748B;
      --gray-400:   #94A3B8;
      --gray-300:   #CBD5E1;
      --gray-200:   #E2E8F0;
      --gray-100:   #F1F5F9;
      --gray-50:    #F8FAFC;
      --white:      #FFFFFF;
      --shadow-sm:  0 1px 3px rgba(0,0,0,0.06);
      --shadow-md:  0 4px 20px rgba(0,0,0,0.08);
      --radius:     8px;
      --radius-lg:  14px;
      --topbar-h:   52px;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #EEF2F7;
      color: var(--gray-700);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── トップバー ─── */
    .topbar {
      background: var(--navy-deep);
      color: var(--white);
      padding: 0 24px;
      height: var(--topbar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar__brand { display: flex; align-items: center; gap: 14px; }
    .topbar__logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--white);
    }
    .topbar__divider { width: 1px; height: 18px; background: rgba(255,255,255,0.25); }
    .topbar__title {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.04em;
    }
    .topbar__actions { display: flex; align-items: center; gap: 16px; }
    .topbar__user {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .topbar__btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--white);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .topbar__btn:hover { background: rgba(255,255,255,0.16); }

    /* ─── 全体レイアウト：左カラム35% / 右カラム65% ─── */
    .console {
      display: grid;
      grid-template-columns: minmax(360px, 35%) 1fr;
      gap: 16px;
      padding: 16px;
      height: calc(100vh - var(--topbar-h));
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ─── パネル共通 ─── */
    .panel {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .panel__head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--gray-100);
    }
    .panel__title {
      font-size: 14px;
      font-weight: 700;
      color: var(--navy-deep);
      letter-spacing: 0.02em;
    }
    .panel__subtitle {
      font-size: 11px;
      color: var(--gray-500);
      margin-top: 2px;
    }

    /* ─── ステータスタブ ─── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 0 14px;
      border-bottom: 1px solid var(--gray-100);
      background: var(--gray-50);
    }
    .tab {
      flex: 1;
      padding: 10px 8px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--gray-500);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--navy); }
    .tab.is-active {
      color: var(--navy-deep);
      border-bottom-color: var(--teal);
      background: var(--white);
    }
    .tab__count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 18px;
      padding: 0 6px;
      border-radius: 100px;
      background: var(--gray-200);
      color: var(--gray-700);
      font-size: 10px;
      font-weight: 700;
    }
    .tab.is-active .tab__count {
      background: var(--teal-pale);
      color: var(--teal);
    }

    /* ─── 依頼カード一覧 ─── */
    .request-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      background: var(--gray-50);
    }
    .request-card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.05s;
    }
    .request-card:hover {
      border-color: var(--teal-light);
      box-shadow: 0 2px 8px rgba(14,165,233,0.12);
    }
    .request-card.is-selected {
      border-color: var(--teal);
      box-shadow: 0 0 0 1px var(--teal), 0 4px 12px rgba(14,165,233,0.15);
    }
    .request-card__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }
    .request-card__num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--gray-400);
      font-variant-numeric: tabular-nums;
    }
    .request-card__title {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy-deep);
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .request-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-size: 11px;
      color: var(--gray-500);
    }
    .request-card__meta-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .request-card__meta-item strong {
      color: var(--gray-700);
      font-weight: 600;
    }

    /* ─── バッジ ─── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .badge--urgent { background: rgba(220,38,38,0.1);  color: var(--red); }
    .badge--high   { background: rgba(245,158,11,0.12); color: var(--amber); }
    .badge--medium { background: rgba(14,165,233,0.1); color: var(--teal); }
    .badge--low    { background: var(--gray-100); color: var(--gray-500); }

    .badge--status {
      background: var(--gray-100);
      color: var(--gray-700);
    }
    .badge--status-submitted     { background: rgba(14,165,233,0.1);  color: var(--teal); }
    .badge--status-under_review  { background: rgba(245,158,11,0.12); color: var(--amber); }
    .badge--status-accepted      { background: rgba(16,185,129,0.1);  color: var(--green); }
    .badge--status-proposing     { background: rgba(91,33,182,0.1);   color: #6D28D9; }
    .badge--status-fully_assigned{ background: rgba(16,185,129,0.12); color: #047857; }
    .badge--status-confirmed     { background: rgba(16,185,129,0.18); color: #047857; }
    .badge--status-cancelled     { background: var(--gray-100); color: var(--gray-500); }
    .badge--status-rejected      { background: rgba(220,38,38,0.08);  color: var(--red); }

    /* ─── 右カラム（詳細プレースホルダー） ─── */
    .detail-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--gray-400);
      padding: 48px 24px;
      text-align: center;
    }
    .detail-empty__icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: var(--gray-300);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.05em;
    }
    .detail-empty__title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-500);
      margin-bottom: 4px;
    }
    .detail-empty__desc {
      font-size: 12px;
      color: var(--gray-400);
      max-width: 320px;
      line-height: 1.7;
    }

    /* ─── 詳細パネル ─── */
    .detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .detail__head {
      padding: 18px 22px 14px;
      border-bottom: 1px solid var(--gray-100);
    }
    .detail__num {
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--gray-400);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .detail__title {
      font-size: 18px;
      font-weight: 700;
      color: var(--navy-deep);
      letter-spacing: -0.01em;
      margin-top: 4px;
      line-height: 1.4;
    }
    .detail__badges {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    /* ─── アクションバー ─── */
    .detail__actions {
      padding: 12px 22px;
      border-bottom: 1px solid var(--gray-100);
      background: var(--gray-50);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .detail__actions-label {
      font-size: 11px;
      color: var(--gray-500);
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-right: 4px;
    }
    .action-btn {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      font-family: inherit;
      transition: background 0.15s, transform 0.05s, box-shadow 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .action-btn:hover { box-shadow: 0 2px 6px rgba(15,23,42,0.10); }
    .action-btn:active { transform: translateY(1px); }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    .action-btn--primary { background: var(--teal); color: var(--white); border-color: var(--teal); }
    .action-btn--primary:hover { background: var(--teal-light); }
    .action-btn--success { background: var(--green); color: var(--white); border-color: var(--green); }
    .action-btn--warn    { background: var(--amber); color: var(--white); border-color: var(--amber); }
    .action-btn--danger  { background: var(--red); color: var(--white); border-color: var(--red); }
    .action-btn--ghost   { background: var(--white); color: var(--gray-700); border-color: var(--gray-300); }
    .action-btn--ghost:hover { background: var(--gray-50); }

    /* ─── 詳細本体 ─── */
    .detail__body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 22px 28px;
    }
    .detail-section { margin-bottom: 22px; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-section__title {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-500);
      font-weight: 700;
      margin-bottom: 10px;
    }
    .detail-section__body {
      color: var(--gray-700);
      font-size: 13px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ─── メタデータグリッド ─── */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px 18px;
    }
    .meta-item__label {
      font-size: 11px;
      color: var(--gray-500);
      font-weight: 500;
      margin-bottom: 2px;
    }
    .meta-item__value {
      font-size: 14px;
      color: var(--navy-deep);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      word-break: break-word;
    }
    .meta-item__value--muted { color: var(--gray-400); font-weight: 400; }

    /* ─── チップ群（資格・スキル） ─── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--gray-100);
      color: var(--gray-700);
      font-size: 11px;
      font-weight: 500;
    }
    .chip--required  { background: rgba(220,38,38,0.08);  color: var(--red); }
    .chip--preferred { background: rgba(14,165,233,0.08); color: var(--teal); }

    /* ─── タイムライン ─── */
    .timeline {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 6px 12px;
      font-size: 12px;
    }
    .timeline__label { color: var(--gray-500); }
    .timeline__value { color: var(--gray-700); font-variant-numeric: tabular-nums; }

    /* ─── 候補者抽出・既存提案セクション ─── */
    .sub-panel__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .sub-panel__count {
      font-size: 11px;
      color: var(--gray-500);
      font-weight: 500;
    }

    /* ── 候補者カード ── */
    .candidate-list { display: grid; gap: 8px; }
    .candidate-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      transition: border-color 0.15s;
    }
    .candidate-card:hover { border-color: var(--gray-300); }
    .candidate-card__main { min-width: 0; }
    .candidate-card__name {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy-deep);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .candidate-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      font-size: 11px;
      color: var(--gray-500);
    }
    .candidate-card__meta strong {
      color: var(--gray-700);
      font-weight: 600;
    }
    .candidate-card__action {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── 既存提案カード ── */
    .proposal-list { display: grid; gap: 8px; }
    .proposal-card {
      padding: 10px 12px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
    }
    .proposal-card__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .proposal-card__num {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--gray-400);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .proposal-card__name {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy-deep);
      margin-bottom: 4px;
    }
    .proposal-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 12px;
      font-size: 11px;
      color: var(--gray-500);
    }

    /* ── 提案ステータスバッジ ── */
    .badge--prop-created             { background: var(--gray-100); color: var(--gray-700); }
    .badge--prop-worker_contacted    { background: rgba(14,165,233,0.10); color: var(--teal); }
    .badge--prop-worker_accepted     { background: rgba(16,185,129,0.10); color: var(--green); }
    .badge--prop-worker_declined     { background: rgba(220,38,38,0.10);  color: var(--red); }
    .badge--prop-proposed_to_facility{ background: rgba(91,33,182,0.10);  color: #6D28D9; }
    .badge--prop-facility_accepted   { background: rgba(16,185,129,0.18); color: #047857; }
    .badge--prop-facility_declined   { background: rgba(220,38,38,0.10);  color: var(--red); }
    .badge--prop-withdrawn           { background: var(--gray-100); color: var(--gray-500); }
    .badge--prop-expired             { background: var(--gray-100); color: var(--gray-500); }

    /* ─── モーダル ─── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-backdrop.is-open { opacity: 1; pointer-events: auto; }
    .modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 480px;
      max-height: calc(100vh - 40px);
      overflow: auto;
      box-shadow: 0 20px 50px rgba(15,23,42,0.25);
      transform: translateY(8px);
      transition: transform 0.2s;
    }
    .modal-backdrop.is-open .modal { transform: translateY(0); }
    .modal__head {
      padding: 18px 22px 12px;
      border-bottom: 1px solid var(--gray-100);
    }
    .modal__title {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy-deep);
    }
    .modal__subtitle {
      font-size: 12px;
      color: var(--gray-500);
      margin-top: 4px;
    }
    .modal__body { padding: 18px 22px; display: grid; gap: 14px; }
    .modal__foot {
      padding: 12px 22px 18px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ─── フォームフィールド ─── */
    .field { display: grid; gap: 4px; }
    .field__label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-700);
      letter-spacing: 0.04em;
    }
    .field__hint { font-size: 11px; color: var(--gray-400); }
    .field__input,
    .field__textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius);
      background: var(--white);
      font-family: inherit;
      font-size: 13px;
      color: var(--gray-900);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field__input:focus,
    .field__textarea:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
    }
    .field__textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ─── トースト ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      z-index: 200;
      transform: translateY(20px);
      opacity: 0;
      transition: transform 0.25s, opacity 0.25s;
      pointer-events: none;
      max-width: 420px;
    }
    .toast.is-visible { transform: translateY(0); opacity: 1; }
    .toast--success { background: var(--green); color: var(--white); }
    .toast--error   { background: var(--red);   color: var(--white); }
    .toast--info    { background: var(--navy-mid); color: var(--white); }

    /* ─── ローディング・エラー・空 ─── */
    .placeholder {
      padding: 40px 16px;
      text-align: center;
      color: var(--gray-400);
      font-size: 13px;
    }
    .alert {
      margin: 12px;
      padding: 12px 14px;
      background: rgba(220,38,38,0.06);
      border: 1px solid rgba(220,38,38,0.18);
      color: var(--red);
      border-radius: var(--radius);
      font-size: 12px;
    }

    /* ─── レスポンシブ ─── */
    @media (max-width: 960px) {
      .console {
        grid-template-columns: 1fr;
        height: auto;
      }
      .panel { min-height: 480px; }
    }
    @media (max-width: 640px) {
      .topbar { padding: 0 14px; }
      .topbar__title { display: none; }
      .console { padding: 10px; gap: 10px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar__brand">
    <span class="topbar__logo">MITAS</span>
    <span class="topbar__divider"></span>
    <span class="topbar__title">Neco オペレーションコンソール</span>
  </div>
  <div class="topbar__actions">
    <span class="topbar__user" id="userName">読み込み中…</span>
    <button class="topbar__btn" id="logoutBtn">ログアウト</button>
  </div>
</div>

<div class="console">
  <!-- ═════ 左カラム：依頼一覧 ═════ -->
  <section class="panel" aria-label="依頼一覧">
    <div class="panel__head">
      <div class="panel__title">人材依頼</div>
      <div class="panel__subtitle">施設からの依頼を状態別に確認します</div>
    </div>

    <div class="tabs" role="tablist">
      <button class="tab is-active" role="tab" data-tab="new">
        <span>新規</span>
        <span class="tab__count" id="count-new">0</span>
      </button>
      <button class="tab" role="tab" data-tab="in_review">
        <span>確認中</span>
        <span class="tab__count" id="count-in_review">0</span>
      </button>
      <button class="tab" role="tab" data-tab="proposing">
        <span>提案中</span>
        <span class="tab__count" id="count-proposing">0</span>
      </button>
      <button class="tab" role="tab" data-tab="done">
        <span>完了</span>
        <span class="tab__count" id="count-done">0</span>
      </button>
    </div>

    <div id="errorBox"></div>

    <div class="request-list" id="requestList" role="list">
      <div class="placeholder">読み込み中…</div>
    </div>
  </section>

  <!-- ═════ 右カラム：詳細パネル ═════ -->
  <section class="panel" id="detailPanel" aria-label="依頼詳細">
    <div class="detail-empty" id="detailEmpty">
      <div class="detail-empty__icon">i</div>
      <div class="detail-empty__title">依頼が選択されていません</div>
      <div class="detail-empty__desc">
        左の一覧から依頼カードを選択すると、詳細・状態遷移ボタン・候補者抽出・既存提案が表示されます。
      </div>
    </div>
    <div class="detail" id="detailArea" hidden>
      <!-- detail__head / __actions / __body は JS で描画 -->
    </div>
  </section>
</div>

<!-- 提案作成モーダル -->
<div class="modal-backdrop" id="proposalModal" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="proposalModalTitle">
    <div class="modal__head">
      <div class="modal__title" id="proposalModalTitle">提案を作成</div>
      <div class="modal__subtitle" id="proposalModalSubtitle">—</div>
    </div>
    <form id="proposalForm" novalidate>
      <div class="modal__body">
        <div class="field-grid">
          <div class="field">
            <label class="field__label" for="propRate">提案時給（円）</label>
            <input class="field__input" type="number" id="propRate" name="proposed_hourly_rate"
                   min="0" step="100" inputmode="numeric" placeholder="例：8000">
            <div class="field__hint">空欄の場合は依頼の希望レンジで提案されます</div>
          </div>
          <div class="field">
            <label class="field__label" for="propScore">マッチスコア（0〜100）</label>
            <input class="field__input" type="number" id="propScore" name="match_score"
                   min="0" max="100" step="0.1" inputmode="decimal" placeholder="例：85">
            <div class="field__hint">省略可。Step4で自動計算予定</div>
          </div>
        </div>
        <div class="field">
          <label class="field__label" for="propExpiry">有効期限（日数）</label>
          <input class="field__input" type="number" id="propExpiry" name="expiry_days"
                 min="1" max="60" step="1" value="7">
          <div class="field__hint">作成日からN日後をワーカーへの提案期限とします</div>
        </div>
        <div class="field">
          <label class="field__label" for="propReason">マッチ理由</label>
          <textarea class="field__textarea" id="propReason" name="match_reason"
                    placeholder="例：内科一般10年・当直経験豊富・希望地域一致"></textarea>
          <div class="field__hint">候補者を選定した根拠を記録します</div>
        </div>
      </div>
      <div class="modal__foot">
        <button type="button" class="action-btn action-btn--ghost" id="proposalCancelBtn">キャンセル</button>
        <button type="submit" class="action-btn action-btn--primary" id="proposalSubmitBtn">提案を作成</button>
      </div>
    </form>
  </div>
</div>

<!-- トースト（成功・失敗メッセージ用） -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
  // ─── Supabaseクライアント初期化 ───
  const SUPABASE_URL = window.__SUPABASE_URL__;
  const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__;
  const isMockMode = !SUPABASE_URL || SUPABASE_URL.includes('YOUR_PROJECT');
  const supabase = !isMockMode && window.supabase
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  // ─── 状態タブ → DBステータス値の対応 ───
  // Necoのオペ視点で「新規 / 確認中 / 提案中 / 完了」の4分類にまとめる
  const TAB_STATUS_MAP = {
    new:        ['submitted'],
    in_review:  ['under_review', 'accepted'],
    proposing:  ['proposing', 'partially_assigned'],
    done:       ['fully_assigned', 'in_progress', 'completion_pending', 'confirmed', 'invoiced', 'paid', 'cancelled', 'rejected'],
  };

  // ステータス表示名（badge用）
  const STATUS_LABEL = {
    draft:              '下書き',
    submitted:          '受付',
    under_review:       '確認中',
    accepted:           '受諾',
    rejected:           '差戻し',
    proposing:          '提案中',
    partially_assigned: '一部充足',
    fully_assigned:     '充足完了',
    in_progress:        '進行中',
    completion_pending: '完了申請',
    confirmed:          '完了確定',
    invoiced:           '請求済',
    paid:               '入金済',
    cancelled:          'キャンセル',
  };

  const PRIORITY_LABEL = {
    urgent: '緊急', high: '高', medium: '中', low: '低',
  };

  // 提案ステータス表示名
  const PROPOSAL_STATUS_LABEL = {
    created:              '作成',
    worker_contacted:     'ワーカー連絡',
    worker_accepted:      'ワーカー承諾',
    worker_declined:      'ワーカー辞退',
    proposed_to_facility: '施設提案中',
    facility_accepted:    '施設承諾',
    facility_declined:    '施設辞退',
    withdrawn:            '取り下げ',
    expired:              '期限切れ',
  };

  const SHIFT_LABEL = {
    on_call: 'オンコール',
    night_duty: '夜勤',
    day_duty: '日勤',
    spot: 'スポット',
    regular_shift: '通常シフト',
    long_term: '長期',
  };

  // ─── 状態遷移マップ（neco_admin が操作可能な遷移） ───
  // db/migrations/0005 の validate_request_transition と整合させること
  // kind は action-btn--*** の修飾子名と対応
  const TRANSITION_MAP = {
    submitted:    [{ target: 'under_review', label: '確認を開始',  kind: 'primary'  }],
    under_review: [
      { target: 'accepted', label: '受諾', kind: 'success' },
      { target: 'rejected', label: '差戻し', kind: 'warn'    },
    ],
    accepted:     [{ target: 'proposing',    label: '提案を開始', kind: 'primary'  }],
    // proposing/partially_assigned は提案・アサインの結果として自動更新される想定だが、
    // オペが手動で進めるケースも想定して用意しておく
    proposing:    [
      { target: 'partially_assigned', label: '一部充足にする', kind: 'ghost' },
      { target: 'fully_assigned',     label: '充足完了にする', kind: 'success' },
    ],
    partially_assigned: [
      { target: 'fully_assigned', label: '充足完了にする', kind: 'success' },
      { target: 'in_progress',    label: '進行中にする',   kind: 'ghost'   },
    ],
  };

  // すべての非終端状態から「キャンセル」が可能（DBトリガー側で paid / cancelled は弾かれる）
  const NON_CANCELLABLE = new Set(['paid', 'cancelled']);

  // ─── アプリ状態 ───
  const state = {
    token: null,
    user: null,
    activeTab: 'new',
    requests: [],
    selectedId: null,
    selectedRequest: null,   // 選択中の依頼の詳細（GET /api/v2/requests/:id の結果）
    isPatching: false,       // 多重送信防止
  };

  // ─── 認証確認＋初期化 ───
  async function init() {
    let token = null;
    let user = null;

    if (supabase) {
      const { data } = await supabase.auth.getSession();
      if (!data.session) {
        location.href = '/login.html?next=' + encodeURIComponent(location.pathname);
        return;
      }
      token = data.session.access_token;
      user = data.session.user;
    } else {
      // モックモード
      token = 'mock-token';
      user = { email: 'neco-admin@example.com' };
    }

    state.token = token;
    state.user = user;
    document.getElementById('userName').textContent = user.email || '';

    bindEvents();
    await loadRequests();
  }

  // ─── イベントバインド ───
  function bindEvents() {
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        if (tab === state.activeTab) return;
        state.activeTab = tab;
        document.querySelectorAll('.tab').forEach(b => b.classList.toggle('is-active', b.dataset.tab === tab));
        renderRequestList();
      });
    });

    // 提案作成モーダル
    document.getElementById('proposalCancelBtn').addEventListener('click', closeProposalModal);
    document.getElementById('proposalForm').addEventListener('submit', submitProposal);
    document.getElementById('proposalModal').addEventListener('click', (e) => {
      // 背景クリックで閉じる（モーダル本体クリックは閉じない）
      if (e.target.id === 'proposalModal') closeProposalModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const modal = document.getElementById('proposalModal');
        if (modal.classList.contains('is-open')) closeProposalModal();
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      if (supabase) {
        await supabase.auth.signOut();
      }
      location.href = '/login.html';
    });
  }

  // ─── 依頼一覧の取得 ───
  async function loadRequests() {
    const listEl = document.getElementById('requestList');
    listEl.innerHTML = '<div class="placeholder">読み込み中…</div>';

    try {
      const res = await fetch('/api/v2/requests?limit=200', {
        headers: {
          Authorization: `Bearer ${state.token}`,
          'Content-Type': 'application/json',
        },
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`API ${res.status}: ${text}`);
      }
      const data = await res.json();
      state.requests = Array.isArray(data.requests) ? data.requests : [];

      // モックモードでは件数が少ないので簡易データを補強
      if (isMockMode) {
        state.requests = getMockRequests();
      }

      updateTabCounts();
      renderRequestList();
    } catch (e) {
      console.error('依頼一覧の取得に失敗:', e);
      // 開発時はモックにフォールバックして UI を確認できるようにする
      state.requests = getMockRequests();
      updateTabCounts();
      renderRequestList();
      showError(`依頼一覧の取得に失敗しました（${e.message}）。モックデータを表示しています。`);
    }
  }

  // ─── タブの件数バッジ更新 ───
  function updateTabCounts() {
    Object.keys(TAB_STATUS_MAP).forEach(tab => {
      const statuses = TAB_STATUS_MAP[tab];
      const n = state.requests.filter(r => statuses.includes(r.status)).length;
      const el = document.getElementById('count-' + tab);
      if (el) el.textContent = n;
    });
  }

  // ─── 依頼一覧のレンダリング ───
  function renderRequestList() {
    const listEl = document.getElementById('requestList');
    const statuses = TAB_STATUS_MAP[state.activeTab] || [];
    const items = state.requests
      .filter(r => statuses.includes(r.status))
      .sort((a, b) => {
        // 緊急・高優先 を先頭に、次に作成日時の降順
        const p = priorityRank(a.priority) - priorityRank(b.priority);
        if (p !== 0) return p;
        return (b.created_at || '').localeCompare(a.created_at || '');
      });

    if (!items.length) {
      listEl.innerHTML = '<div class="placeholder">該当する依頼はありません</div>';
      return;
    }

    listEl.innerHTML = items.map(r => renderCard(r)).join('');

    // クリックで選択
    listEl.querySelectorAll('.request-card').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        selectRequest(id);
      });
    });

    // 直前まで選択していた依頼を再選択（リスト再描画後の状態維持）
    if (state.selectedId) {
      const card = listEl.querySelector(`.request-card[data-id="${cssEscape(state.selectedId)}"]`);
      if (card) card.classList.add('is-selected');
    }
  }

  // ─── 依頼の選択 → 詳細取得 → 描画 ───
  async function selectRequest(id) {
    state.selectedId = id;
    document.querySelectorAll('.request-card').forEach(c => {
      c.classList.toggle('is-selected', c.dataset.id === id);
    });

    // 一覧から見つかった行を仮表示し、その後詳細APIで上書きする
    const fromList = state.requests.find(r => r.id === id);
    if (fromList) {
      state.selectedRequest = fromList;
      renderDetail(fromList, { loading: true });
    }

    try {
      const r = await fetchRequestDetail(id);
      state.selectedRequest = r;
      renderDetail(r);
    } catch (e) {
      console.error('依頼詳細の取得に失敗:', e);
      // 一覧データのままで描画継続（最低限の情報は出る）
      if (fromList) renderDetail(fromList);
      showToast('error', `詳細の取得に失敗しました（${e.message}）`);
    }

    // 詳細を表示したあとに、提案・候補者を非同期で取得して描画
    loadProposalsAndCandidates(id);
  }

  // ─── 既存提案と候補者を並行取得 → 描画 ───
  async function loadProposalsAndCandidates(requestId) {
    state.selectedProposals = [];
    state.selectedCandidates = [];

    const r = state.selectedRequest;
    if (!r) return;

    const [proposalsResult, candidatesResult] = await Promise.allSettled([
      fetchExistingProposals(requestId),
      fetchCandidates(r.profession_type),
    ]);

    // 切替が起きていたら描画をスキップ
    if (state.selectedId !== requestId) return;

    if (proposalsResult.status === 'fulfilled') {
      state.selectedProposals = proposalsResult.value;
    } else {
      console.error('既存提案の取得に失敗:', proposalsResult.reason);
      showToast('error', `既存提案の取得に失敗しました：${proposalsResult.reason.message}`);
    }

    if (candidatesResult.status === 'fulfilled') {
      state.selectedCandidates = candidatesResult.value;
    } else {
      console.error('候補者の取得に失敗:', candidatesResult.reason);
      showToast('error', `候補者の取得に失敗しました：${candidatesResult.reason.message}`);
    }

    renderProposalsSection();
    renderCandidatesSection();
  }

  async function fetchRequestDetail(id) {
    if (isMockMode) {
      const r = state.requests.find(x => x.id === id);
      if (!r) throw new Error('該当依頼が見つかりません');
      // モック詳細を補強
      return Object.assign({
        description: 'これはモックデータの説明文です。\n施設の希望や条件をここに記載します。',
        shift_type: 'on_call',
        end_at: r.start_at,
        hourly_rate_min: 8000,
        hourly_rate_max: 12000,
        total_budget: null,
        required_licenses: ['医師免許'],
        required_skills: ['内科一般', '当直経験'],
        preferred_skills: ['英会話', '電子カルテ操作'],
        submitted_at: r.created_at,
        reviewed_at: null,
        accepted_at: null,
      }, r);
    }
    const res = await fetch(`/api/v2/requests/${encodeURIComponent(id)}`, {
      headers: {
        Authorization: `Bearer ${state.token}`,
        'Content-Type': 'application/json',
      },
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(`API ${res.status}: ${t}`);
    }
    const data = await res.json();
    return data.request || data;
  }

  // ─── 詳細パネルのレンダリング ───
  function renderDetail(r, opts = {}) {
    const empty = document.getElementById('detailEmpty');
    const area  = document.getElementById('detailArea');
    empty.hidden = true;
    area.hidden  = false;

    const priority = r.priority || 'medium';
    const transitions = TRANSITION_MAP[r.status] || [];
    const canCancel = !NON_CANCELLABLE.has(r.status);

    const startEnd = formatRange(r.start_at, r.end_at);
    const wage = formatWage(r.hourly_rate_min, r.hourly_rate_max);
    const budget = r.total_budget != null ? `¥${Number(r.total_budget).toLocaleString()}` : '—';

    const reqLicenses = arrChips(r.required_licenses, 'required');
    const reqSkills   = arrChips(r.required_skills,   'required');
    const prefSkills  = arrChips(r.preferred_skills,  'preferred');

    area.innerHTML = `
      <div class="detail__head">
        <div class="detail__num">${escapeHtml(r.request_number || '')}</div>
        <h2 class="detail__title">${escapeHtml(r.title || '(タイトルなし)')}</h2>
        <div class="detail__badges">
          <span class="badge badge--status-${escapeHtml(r.status)}">${STATUS_LABEL[r.status] || r.status}</span>
          <span class="badge badge--${priority}">優先度：${PRIORITY_LABEL[priority] || priority}</span>
          ${opts.loading ? '<span class="badge badge--low">読み込み中…</span>' : ''}
        </div>
      </div>

      <div class="detail__actions" id="detailActions">
        ${transitions.length || canCancel
          ? '<span class="detail__actions-label">状態遷移：</span>'
          : '<span class="detail__actions-label">この状態では遷移できる操作はありません。</span>'}
        ${transitions.map(t => `
          <button class="action-btn action-btn--${t.kind}" data-target="${t.target}">
            ${escapeHtml(t.label)}
          </button>
        `).join('')}
        ${canCancel ? `
          <button class="action-btn action-btn--ghost" data-target="cancelled">
            キャンセル
          </button>` : ''}
      </div>

      <div class="detail__body">
        ${r.description ? `
          <div class="detail-section">
            <div class="detail-section__title">概要</div>
            <div class="detail-section__body">${escapeHtml(r.description)}</div>
          </div>` : ''}

        <div class="detail-section">
          <div class="detail-section__title">基本情報</div>
          <div class="meta-grid">
            <div><div class="meta-item__label">職種</div><div class="meta-item__value">${escapeHtml(professionLabel(r.profession_type))}</div></div>
            <div><div class="meta-item__label">専門・科</div><div class="meta-item__value ${r.specialty ? '' : 'meta-item__value--muted'}">${escapeHtml(r.specialty || '—')}</div></div>
            <div><div class="meta-item__label">必要人数</div><div class="meta-item__value">${r.headcount || 1}名</div></div>
            <div><div class="meta-item__label">シフト種別</div><div class="meta-item__value">${escapeHtml(SHIFT_LABEL[r.shift_type] || r.shift_type || '—')}</div></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section__title">スケジュール</div>
          <div class="meta-grid">
            <div><div class="meta-item__label">開始</div><div class="meta-item__value">${escapeHtml(formatDateTime(r.start_at))}</div></div>
            <div><div class="meta-item__label">終了</div><div class="meta-item__value">${escapeHtml(formatDateTime(r.end_at))}</div></div>
            <div style="grid-column: 1 / -1;"><div class="meta-item__label">期間</div><div class="meta-item__value">${escapeHtml(startEnd)}</div></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section__title">報酬</div>
          <div class="meta-grid">
            <div><div class="meta-item__label">時給レンジ</div><div class="meta-item__value">${escapeHtml(wage)}</div></div>
            <div><div class="meta-item__label">総予算</div><div class="meta-item__value">${escapeHtml(budget)}</div></div>
          </div>
        </div>

        ${reqLicenses ? `
          <div class="detail-section">
            <div class="detail-section__title">必須資格</div>
            <div class="chips">${reqLicenses}</div>
          </div>` : ''}

        ${reqSkills ? `
          <div class="detail-section">
            <div class="detail-section__title">必須スキル</div>
            <div class="chips">${reqSkills}</div>
          </div>` : ''}

        ${prefSkills ? `
          <div class="detail-section">
            <div class="detail-section__title">希望スキル</div>
            <div class="chips">${prefSkills}</div>
          </div>` : ''}

        <div class="detail-section">
          <div class="detail-section__title">タイムライン</div>
          <div class="timeline">
            <div class="timeline__label">作成</div>
            <div class="timeline__value">${escapeHtml(formatDateTime(r.created_at))}</div>
            <div class="timeline__label">提出</div>
            <div class="timeline__value">${escapeHtml(formatDateTime(r.submitted_at))}</div>
            <div class="timeline__label">確認開始</div>
            <div class="timeline__value">${escapeHtml(formatDateTime(r.reviewed_at))}</div>
            <div class="timeline__label">受諾</div>

  // ─── 状態遷移の PATCH ───
  async function transitionRequest(id, currentStatus, targetStatus) {
    if (state.isPatching) return;

    const targetLabel = STATUS_LABEL[targetStatus] || targetStatus;
    const currentLabel = STATUS_LABEL[currentStatus] || currentStatus;
    const ok = window.confirm(`依頼の状態を「${currentLabel}」→「${targetLabel}」に変更します。よろしいですか？`);
    if (!ok) return;

    state.isPatching = true;
    document.querySelectorAll('#detailActions .action-btn').forEach(b => { b.disabled = true; });

    try {
      if (isMockMode) {
        // モックでは状態だけローカルで書き換えてリスト・詳細を再描画
        const idx = state.requests.findIndex(x => x.id === id);
        if (idx >= 0) {
          state.requests[idx] = { ...state.requests[idx], status: targetStatus };
          if (state.selectedRequest && state.selectedRequest.id === id) {
            state.selectedRequest = { ...state.selectedRequest, status: targetStatus };
          }
        }
        await new Promise(r => setTimeout(r, 250));
        showToast('success', `状態を「${targetLabel}」に変更しました（モック）`);
      } else {
        const res = await fetch(`/api/v2/requests/${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: {
            Authorization: `Bearer ${state.token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ status: targetStatus }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          if (res.status === 409) {
            throw new Error(data.error || '不正な状態遷移です');
          }
          throw new Error(data.error || data.detail || `API ${res.status}`);
        }
        showToast('success', `状態を「${targetLabel}」に変更しました`);
      }

      updateTabCounts();
      renderRequestList();
      if (state.selectedId === id) {
        // 最新の値を取り直して詳細を再描画
        try {
          const fresh = await fetchRequestDetail(id);
          state.selectedRequest = fresh;
          renderDetail(fresh);
        } catch (_) {
          // 取れなかった場合はローカル値で描画
          const local = state.requests.find(x => x.id === id);
          if (local) renderDetail(local);
        }
      }
    } catch (e) {
      console.error('状態遷移失敗:', e);
      showToast('error', `変更に失敗しました：${e.message}`);
      // ボタン再有効化のためもう一度描画
      if (state.selectedRequest) renderDetail(state.selectedRequest);
    } finally {
      state.isPatching = false;
    }
  }

  // ─── PostgREST 直接アクセス（提案POST・候補者抽出に使用） ───
  async function pgFetch(path, init = {}) {
    if (isMockMode) {
      return mockPgFetch(path, init);
    }
    const headers = {
      'Content-Type': 'application/json',
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${state.token}`,
      ...(init.headers || {}),
    };
    const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, { ...init, headers });
    const text = await res.text();
    let json = null;
    try { json = text ? JSON.parse(text) : null; } catch { /* noop */ }
    if (!res.ok) {
      const msg = (json && (json.message || json.error)) || `HTTP ${res.status}`;
      const err = new Error(msg);
      err.status = res.status;
      err.body = json;
      throw err;
    }
    return json;
  }

  // profession_type一致 + is_available_for_offers=true + onboarding_status=approved

    const path = `/worker_profiles`
      + `?profession_type=eq.${encodeURIComponent(profession_type)}`
      + `&is_available_for_offers=eq.true`
      + `&onboarding_status=eq.approved`
      + `&select=${select}`
      + `&order=years_experience.desc.nullslast`
      + `&limit=50`;
    const rows = await pgFetch(path);
    return Array.isArray(rows) ? rows : [];

  // ─── 提案を作成（POST /rest/v1/proposals） ───
  async function submitProposal(e) {
    e.preventDefault();
    if (!state.proposalContext || state.isPosting) return;

    const { worker, request } = state.proposalContext;
    const submitBtn = document.getElementById('proposalSubmitBtn');
    state.isPosting = true;
    submitBtn.disabled = true;

    const form = document.getElementById('proposalForm');
    const fd = new FormData(form);
    const rate = (fd.get('proposed_hourly_rate') || '').toString().trim();
    const score = (fd.get('match_score') || '').toString().trim();
    const expiryDays = parseInt(fd.get('expiry_days'), 10);
    const reason = (fd.get('match_reason') || '').toString().trim();

    const days = Number.isFinite(expiryDays) && expiryDays > 0 ? expiryDays : 7;
    const expiresAt = new Date(Date.now() + days * 86400000).toISOString();

    const payload = {
      proposal_number: generateProposalNumber(),
      request_id: request.id,
      worker_id: worker.id,
      proposed_by: state.user && state.user.id ? state.user.id : null,
      proposed_hourly_rate: rate ? parseInt(rate, 10) : null,
      match_score: score ? parseFloat(score) : null,
      match_reason: reason || null,
      expires_at: expiresAt,
      status: 'created',
    };

    try {
      const created = await pgFetch('/proposals', {
        method: 'POST',
        headers: { Prefer: 'return=representation' },
        body: JSON.stringify(payload),
      });
      const row = Array.isArray(created) ? created[0] : created;
      // worker名を補強（描画用）
      row.worker_name = worker.full_name;

      state.selectedProposals = [row, ...(state.selectedProposals || [])];

      showToast('success', `${worker.full_name} さんへの提案を作成しました`);
      closeProposalModal();
      renderProposalsSection();
      renderCandidatesSection();
    } catch (err) {
      console.error('提案作成失敗:', err);
      // PostgREST の UNIQUE 違反は HTTP 409
      if (err.status === 409 || /duplicate|unique|23505/i.test(err.message)) {
        showToast('error', 'この候補者には既に提案済みです');
      } else if (err.status === 403) {
        showToast('error', '提案作成の権限がありません（neco_admin のみ）');
      } else {
        showToast('error', `提案の作成に失敗しました：${err.message}`);
      }
    } finally {
      state.isPosting = false;
      submitBtn.disabled = false;
    }
  }

  // ─── 提案番号の採番（PR-YYYY-NNNNNN） ───
  // proposal_number は UNIQUE。フロントで生成する場合の衝突を避けるため
  // Date.now() の末尾6桁を使用（worker-app の request_number と同方式）。
  function generateProposalNumber() {
    const y = new Date().getFullYear();
    const tail = ('00000' + Date.now().toString()).slice(-6);
    return `PR-${y}-${tail}`;
  }

  function formatDate(s) {
    if (!s) return '';
    const d = new Date(s);
    if (Number.isNaN(d.getTime())) return s;
    const m = ('0' + (d.getMonth() + 1)).slice(-2);
    const day = ('0' + d.getDate()).slice(-2);
    return `${d.getFullYear()}/${m}/${day}`;
  }

  // YYYY/MM/DD HH:mm 形式（NULLは「—」）
  function formatDateTime(s) {
    if (!s) return '—';
    const d = new Date(s);
    if (Number.isNaN(d.getTime())) return s;
    const m  = ('0' + (d.getMonth() + 1)).slice(-2);
    const dd = ('0' + d.getDate()).slice(-2);
    const hh = ('0' + d.getHours()).slice(-2);
    const mm = ('0' + d.getMinutes()).slice(-2);
    return `${d.getFullYear()}/${m}/${dd} ${hh}:${mm}`;
  }

  // 開始〜終了の期間表示（同日なら時間レンジに圧縮）
  function formatRange(start, end) {
    if (!start && !end) return '—';
    if (!start) return `〜 ${formatDateTime(end)}`;
    if (!end)   return `${formatDateTime(start)} 〜`;
    const s = new Date(start), e = new Date(end);
    if (Number.isNaN(s.getTime()) || Number.isNaN(e.getTime())) {
      return `${formatDateTime(start)} 〜 ${formatDateTime(end)}`;
    }
    const sameDay = s.getFullYear() === e.getFullYear()
      && s.getMonth() === e.getMonth() && s.getDate() === e.getDate();
    if (sameDay) {
      const ehh = ('0' + e.getHours()).slice(-2);
      const emm = ('0' + e.getMinutes()).slice(-2);
      return `${formatDateTime(start)} 〜 ${ehh}:${emm}`;
    }
    return `${formatDateTime(start)} 〜 ${formatDateTime(end)}`;
  }

  // 時給レンジの表示
  function formatWage(min, max) {
    const yen = (n) => `¥${Number(n).toLocaleString()}`;
    if (min == null && max == null) return '—';
    if (min != null && max != null) {
      if (min === max) return `${yen(min)} / 時`;
      return `${yen(min)} 〜 ${yen(max)} / 時`;
    }
    return `${yen(min ?? max)} / 時`;
  }

  // 配列 → チップ群のHTML（空なら null を返す）
  function arrChips(arr, kind) {
    if (!Array.isArray(arr) || !arr.length) return null;
    const cls = kind ? `chip chip--${kind}` : 'chip';
    return arr.map(v => `<span class="${cls}">${escapeHtml(v)}</span>`).join('');

  // querySelector 用に ID をエスケープ（UUID なので過剰な対応は不要だが念のため）
  function cssEscape(s) {
    if (window.CSS && CSS.escape) return CSS.escape(s);
    return String(s).replace(/["\\]/g, '\\$&');
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ─── モック PostgREST（開発・UI確認用） ───
  // pgFetch がモックモードで呼ばれた時に、最低限のクエリを解釈して固定データを返す
  function mockPgFetch(path, init = {}) {
    const method = (init.method || 'GET').toUpperCase();

    // 提案作成（POST）
    if (method === 'POST' && path.startsWith('/proposals')) {
      const body = init.body ? JSON.parse(init.body) : {};
      // UNIQUE(request_id, worker_id) の模擬チェック
      const dup = (state.selectedProposals || []).some(
        p => p.worker_id === body.worker_id && p.request_id === body.request_id
      );
      if (dup) {
        const err = new Error('duplicate key value violates unique constraint');
        err.status = 409;
        throw err;
      }
      const row = { id: 'mock-' + Date.now(), created_at: new Date().toISOString(), ...body };
      return [row];
    }

    // 提案一覧（GET）
    if (method === 'GET' && path.startsWith('/proposals?')) {
      const m = path.match(/request_id=eq\.([^&]+)/);
      const requestId = m ? decodeURIComponent(m[1]) : null;
      return getMockProposalsFor(requestId);
    }

    // 候補者抽出（GET worker_profiles）
    if (method === 'GET' && path.startsWith('/worker_profiles?')) {
      const m = path.match(/profession_type=eq\.([^&]+)/);
      const profession = m ? decodeURIComponent(m[1]) : null;
      return getMockCandidates(profession);
    }

    return [];
  }

  function getMockCandidates(profession) {
    const all = [
